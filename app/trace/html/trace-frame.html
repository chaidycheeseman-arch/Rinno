<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
    <title>踪迹 - 监控</title>
    <style>
        :root {
            --paper-white: #FAFAFA;
            --paper-soft: #F2F2F2;
            --ink-black: #282828;
            --ink-muted: #747474;
            --line-soft: rgba(40,40,40,.08);
            --line-hair: rgba(40,40,40,.05);
            --surface: rgba(255,255,255,.80);
            --surface-solid: #FFFFFF;
            --shadow-soft: rgba(40,40,40,.065);
            --font-serif: "Songti SC", "STSong", "Times New Roman", Georgia, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        body {
            background:
                radial-gradient(circle at 18% 8%, rgba(255,255,255,.96), transparent 34%),
                linear-gradient(180deg, var(--paper-white) 0%, var(--paper-soft) 100%);
            color: var(--ink-black);
            font-family: var(--font-sans);
            touch-action: none;
        }
        button { font: inherit; color: inherit; }
        .trace-root { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .trace-select,
        .trace-dashboard {
            position: absolute;
            inset: 0;
            padding: max(28px, env(safe-area-inset-top, 0px) + 22px) 18px max(22px, env(safe-area-inset-bottom, 0px) + 18px);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .trace-select[hidden], .trace-dashboard[hidden] { display: none ; }
        .trace-hero { flex: 0 0 auto; padding: 10px 2px 18px; }
        .trace-kicker { font-size: 10px; font-weight: 500; letter-spacing: 4px; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 12px; }
        .trace-title { margin: 0; font-family: var(--font-serif); font-size: clamp(35px, 12vw, 50px); font-style: italic; font-weight: 400; letter-spacing: -2px; line-height: .88; }
        .trace-desc { width: min(88%, 340px); margin: 16px 0 0; font-size: 12px; line-height: 1.75; color: var(--ink-muted); letter-spacing: .35px; }
        .trace-list-head { flex: 0 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; padding: 2px 2px 12px; }
        .trace-list-head strong { display: block; font-size: 16px; font-weight: 500; letter-spacing: -.2px; }
        .trace-list-head span, .trace-count { display: block; margin-top: 4px; font-size: 10px; color: var(--ink-muted); letter-spacing: 1px; text-transform: uppercase; }
        .trace-list { flex: 1; min-height: 0; overflow: auto; display: flex; flex-direction: column; gap: 10px; padding: 2px 0 0; -webkit-overflow-scrolling: touch; }
        .trace-target-card {
            width: 100%; border: 0; border-radius: 24px; background: rgba(255,255,255,.74);
            box-shadow: inset 0 0 0 1px var(--line-hair); padding: 12px;
            display: grid; grid-template-columns: 52px minmax(0, 1fr) auto; align-items: center; gap: 12px;
            text-align: left; cursor: pointer;
        }
        .trace-target-card:active { transform: scale(.986); }
        .trace-avatar { width: 52px; height: 52px; border-radius: 18px; background: linear-gradient(135deg, #ECECEC, #D6D6D6); display: flex; align-items: center; justify-content: center; overflow: hidden; background-size: cover; background-position: center; font-family: var(--font-serif); font-size: 21px; }
        .trace-name, .trace-meta { display: block; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .trace-name { font-size: 15px; font-weight: 500; }
        .trace-meta { margin-top: 5px; font-size: 11px; color: var(--ink-muted); }
        .trace-arrow { width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; background: var(--ink-black); color: var(--paper-white); font-size: 15px; line-height: 1; }
        .trace-empty { margin: auto; width: min(88%, 300px); text-align: center; color: var(--ink-muted); font-size: 12px; line-height: 1.8; padding: 28px 14px; }
        .trace-empty strong { display: block; color: var(--ink-black); font-size: 15px; font-weight: 500; margin-bottom: 8px; }
        .trace-dashboard { background: linear-gradient(180deg, rgba(255,255,255,.72), rgba(246,246,246,.95)), repeating-linear-gradient(90deg, rgba(0,0,0,.018) 0 1px, transparent 1px 18px); gap: 12px; }
        .trace-topbar { flex: 0 0 auto; display: grid; grid-template-columns: 34px minmax(0, 1fr) 36px; align-items: center; gap: 10px; padding: 0 2px 2px; }
        .trace-back, .trace-refresh { width: 34px; height: 34px; border: 0; border-radius: 999px; background: rgba(255,255,255,.72); box-shadow: inset 0 0 0 1px var(--line-hair); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .trace-refresh[disabled] { opacity: .45; pointer-events: none; }
        .trace-back svg, .trace-refresh svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .trace-refresh.is-spinning svg { animation: traceSpin 1s linear infinite; }
        @keyframes traceSpin { to { transform: rotate(360deg); } }
        .trace-screen-title { min-width: 0; }
        .trace-screen-title small { display: block; font-size: 9px; letter-spacing: 3px; color: var(--ink-muted); text-transform: uppercase; }
        .trace-screen-title strong { display: block; margin-top: 3px; font-family: var(--font-serif); font-size: 23px; font-style: italic; font-weight: 400; letter-spacing: -.8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .monitor-wrap { flex: 0 0 clamp(310px, 50vh, 430px); min-height: 0; border-radius: 30px; background: linear-gradient(145deg, #171717, #070707); padding: 7px; box-shadow: 0 22px 48px rgba(0,0,0,.15), inset 0 0 0 1px rgba(255,255,255,.05); }
        .monitor-screen { position: relative; height: 100%; min-height: 0; border-radius: 23px; overflow: hidden; background: radial-gradient(circle at 24% 18%, rgba(255,255,255,.13), transparent 25%), radial-gradient(circle at var(--hot-x, 48%) var(--hot-y, 42%), rgba(255,255,255,.16), transparent 30%), linear-gradient(135deg, #191919, #303030 44%, #111); }
        .monitor-screen::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(180deg, rgba(255,255,255,.036) 0 1px, transparent 1px 4px), linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent); opacity: .74; mix-blend-mode: screen; pointer-events: none; }
        .monitor-screen::after { content: ''; position: absolute; inset: 13px; border: 1px solid rgba(255,255,255,.13); border-radius: 18px; pointer-events: none; box-shadow: inset 0 0 30px rgba(0,0,0,.18); }
        .monitor-room-name { position: absolute; top: 18px; left: 18px; display: flex; flex-direction: column; gap: 4px; color: #fff; z-index: 3; max-width: 52%; }
        .monitor-room-name small { font-size: 9px; letter-spacing: 3px; opacity: .65; text-transform: uppercase; }
        .monitor-room-name strong { font-family: var(--font-serif); font-size: 29px; font-style: italic; font-weight: 400; letter-spacing: -1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .monitor-status-row { position: absolute; top: 18px; right: 18px; z-index: 4; display: inline-flex; align-items: center; gap: 10px; max-width: 44%; color: rgba(255,255,255,.76); }
        .monitor-live-dot { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 6px 8px; background: rgba(255,255,255,.11); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.80); font-size: 8px; letter-spacing: 1.4px; backdrop-filter: blur(4px); }
        .monitor-live-dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #C7382C; box-shadow: 0 0 12px rgba(199,56,44,.72); animation: tracePulse 1.6s ease-in-out infinite; }
        .monitor-time { min-width: 58px; text-align: right; color: rgba(255,255,255,.64); font-size: 10px; letter-spacing: 1.2px; }
        @keyframes tracePulse { 0%,100% { opacity:.32; transform:scale(.72); } 50% { opacity:1; transform:scale(1); } }
        .monitor-scene { position: absolute; inset: 84px 18px 118px 18px; display: grid; grid-template-columns: 1.05fr .95fr; gap: 12px; z-index: 1; opacity: .76; }
        .scene-block, .scene-line, .scene-small { border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.07); backdrop-filter: blur(2px); }
        .scene-block { border-radius: 18px; min-height: 88px; position: relative; overflow: hidden; }
        .scene-block::after { content: ''; position: absolute; left: 18%; right: 18%; bottom: 18px; height: 1px; background: rgba(255,255,255,.26); }
        .scene-stack { display: grid; grid-template-rows: .9fr 1.1fr; gap: 12px; }
        .scene-line { border-radius: 999px; }
        .scene-small { border-radius: 16px; }
        .monitor-info-panel { position: absolute; left: 18px; right: 18px; bottom: 78px; z-index: 4; color: rgba(255,255,255,.84); display: grid; gap: 6px; }
        .monitor-info-panel small { font-size: 8px; letter-spacing: 2.8px; text-transform: uppercase; color: rgba(255,255,255,.52); }
        .monitor-info-panel strong { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .monitor-info-panel span { font-size: 10px; line-height: 1.45; color: rgba(255,255,255,.62); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .monitor-layout-plane { display: none ; }
        .floor-room { position: relative; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.065); color: rgba(255,255,255,.82); padding: 9px 10px; overflow: hidden; cursor: pointer; backdrop-filter: blur(2px); transition: background .18s ease, color .18s ease, transform .18s ease; }
        .floor-room:nth-child(1) { border-radius: 22px 12px 12px 22px; }
        .floor-room:nth-child(2) { border-radius: 12px 22px 12px 12px; }
        .floor-room:nth-child(3) { border-radius: 12px 12px 12px 22px; }
        .floor-room:nth-child(4) { border-radius: 12px 12px 22px 12px; }
        .floor-room:nth-child(n+5) { border-radius: 16px; }
        .floor-room.active { background: rgba(255,255,255,.90); color: #151515; border-color: rgba(255,255,255,.74); transform: translateY(-1px); }
        .floor-room.large { grid-row: span 2; }
        .floor-room small { display: block; font-size: 7px; letter-spacing: 1.4px; text-transform: uppercase; opacity: .56; }
        .floor-room strong { display: block; margin-top: 4px; font-size: 11px; line-height: 1.15; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .floor-room em { position: absolute; left: 10px; right: 10px; bottom: 8px; font-style: normal; font-size: 8px; line-height: 1.2; opacity: .62; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .floor-room::after { content: ''; position: absolute; right: 10px; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .42; }
        .monitor-item-dock { position: absolute; left: 18px; right: 18px; bottom: 22px; z-index: 5; display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .monitor-item-dock::-webkit-scrollbar { display: none; }
        .monitor-item { flex: 0 0 auto; max-width: 128px; border: 0; border-radius: 999px; padding: 7px 10px; background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.13); color: rgba(255,255,255,.82); font-size: 9px; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .monitor-item:active { transform: scale(.97); }
        .monitor-caption { position: absolute; left: 18px; right: 18px; bottom: 55px; color: rgba(255,255,255,.58); display: flex; justify-content: space-between; gap: 10px; z-index: 3; font-size: 8px; letter-spacing: 1.2px; text-transform: uppercase; }
        .camera-strip { flex: 0 0 auto; display: flex; gap: 8px; overflow-x: auto; padding: 1px 1px 2px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .camera-strip::-webkit-scrollbar { display: none; }
        .camera-tab { flex: 0 0 auto; min-width: 84px; border: 0; border-radius: 20px; background: rgba(255,255,255,.76); box-shadow: inset 0 0 0 1px var(--line-hair), 0 10px 22px rgba(40,40,40,.045); padding: 10px 12px; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; cursor: pointer; text-align: left; }
        .camera-tab[aria-pressed="true"] { background: var(--ink-black); color: var(--paper-white); box-shadow: none; }
        .camera-tab small { font-size: 8px; opacity: .58; letter-spacing: 1.4px; text-transform: uppercase; }
        .camera-tab strong { font-size: 12px; font-weight: 500; }
        .trace-toast { position: absolute; left: 22px; right: 22px; bottom: max(22px, env(safe-area-inset-bottom, 0px) + 16px); z-index: 20; border-radius: 999px; padding: 11px 14px; background: rgba(17,17,17,.86); color: #fff; font-size: 11px; text-align: center; opacity: 0; transform: translateY(10px); pointer-events: none; transition: opacity .2s ease, transform .2s ease; }
        .trace-toast.show { opacity: 1; transform: translateY(0); }
        .trace-loading { position: absolute; inset: 0; z-index: 12; display: none; place-items: center; background: rgba(10,10,10,.34); backdrop-filter: blur(3px); color: rgba(255,255,255,.86); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        .trace-loading.show { display: grid; }
        .item-popover { position: absolute; left: 18px; right: 18px; bottom: 18px; z-index: 16; border-radius: 22px; padding: 15px 16px 14px; background: rgba(255,255,255,.95); color: #222; box-shadow: 0 20px 44px rgba(0,0,0,.20); display: none; border: 1px solid rgba(255,255,255,.72); }
        .item-popover.show { display: block; }
        .item-popover small { display: block; font-size: 8px; letter-spacing: 2px; color: #777; text-transform: uppercase; }
        .item-popover strong { display: block; margin-top: 6px; font-size: 15px; font-weight: 500; }
        .item-popover p { margin: 8px 0 0; font-size: 12px; color: #666; line-height: 1.7; user-select: text; -webkit-user-select: text; }
        .item-popover-actions { margin-top: 13px; display: flex; justify-content: flex-end; gap: 8px; }
        .item-forward-btn { border: 0; border-radius: 999px; background: #202020; color: #fff; padding: 9px 13px; font-size: 11px; letter-spacing: .6px; cursor: pointer; box-shadow: 0 10px 22px rgba(0,0,0,.12); }
        .item-forward-btn:active { transform: scale(.98); }
    </style>
</head>
<body>
    <main class="trace-root">
        <section id="trace-select" class="trace-select" aria-label="选择监控对象">
            <div class="trace-hero">
                <div class="trace-kicker">TRACE MONITOR</div>
                <h1 class="trace-title">选择<br>监控对象</h1>
                <p class="trace-desc">踪迹只负责查岗与监控。选择私叙通讯录里的联系人后，会进入 TA 的虚拟监控页；房间结构按人设生成并固定，右上角刷新可重新生成。</p>
            </div>
            <div class="trace-list-head">
                <div><strong>已添加联系人</strong><span>tap one to monitor</span></div>
                <div class="trace-count" id="trace-count">0</div>
            </div>
            <div class="trace-list" id="trace-list"><div class="trace-empty"><strong>正在读取通讯录</strong>请稍候。</div></div>
        </section>

        <section id="trace-dashboard" class="trace-dashboard" hidden aria-label="踪迹监控">
            <div class="trace-topbar">
                <button class="trace-back" id="trace-back" type="button" aria-label="返回选择对象"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
                <div class="trace-screen-title"><small>private monitor</small><strong id="trace-current-name">踪迹</strong></div>
                <button class="trace-refresh" id="trace-refresh" type="button" aria-label="刷新并重新生成房间"><svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v5h-5"/></svg></button>
            </div>

            <section class="monitor-wrap" aria-label="虚拟监控屏幕">
                <div class="monitor-screen" id="monitor-screen">
                    <div class="trace-loading" id="trace-loading">generating room</div>
                    <div class="monitor-room-name"><small id="monitor-code">CAM 01</small><strong id="monitor-room">客厅</strong></div>
                    <div class="monitor-status-row"><div class="monitor-live-dot">LIVE</div><div class="monitor-time" id="monitor-time">--:--:--</div></div>
                    <div class="monitor-scene" aria-hidden="true"><div class="scene-block"></div><div class="scene-stack"><div class="scene-line"></div><div class="scene-small"></div></div></div>
                    <div class="monitor-info-panel"><small>current position</small><strong id="location-name">家中</strong><span id="location-address">正在定位</span></div>
                    <div class="monitor-caption"><span id="monitor-note">signal stable</span><span id="layout-status">feed fixed</span></div>
                    <div class="monitor-item-dock" id="monitor-item-dock" aria-label="可翻找位置"></div>
                    <div class="item-popover" id="item-popover"><small>found detail</small><strong id="item-pop-title"></strong><p id="item-pop-content"></p><div class="item-popover-actions"><button class="item-forward-btn" id="item-forward" type="button">转发到私叙</button></div></div>
                </div>
            </section>

            <div class="camera-strip" id="camera-strip" aria-label="切换监控屏幕"></div>
        </section>
        <div class="trace-toast" id="trace-toast"></div>
    </main>

    <script>
    (() => {
        const selectScreen = document.getElementById('trace-select');
        const dashboard = document.getElementById('trace-dashboard');
        const traceList = document.getElementById('trace-list');
        const traceCount = document.getElementById('trace-count');
        const traceBack = document.getElementById('trace-back');
        const traceRefresh = document.getElementById('trace-refresh');
        const currentName = document.getElementById('trace-current-name');
        const monitorScreen = document.getElementById('monitor-screen');
        const monitorCode = document.getElementById('monitor-code');
        const monitorRoom = document.getElementById('monitor-room');
        const monitorTime = document.getElementById('monitor-time');
        const monitorNote = document.getElementById('monitor-note');
        const cameraStrip = document.getElementById('camera-strip');
        const locationName = document.getElementById('location-name');
        const locationAddress = document.getElementById('location-address');
        const layoutStatus = document.getElementById('layout-status');
        const floorPlan = document.getElementById('floor-plan');
        const itemDock = document.getElementById('monitor-item-dock');
        const itemPopover = document.getElementById('item-popover');
        const itemPopTitle = document.getElementById('item-pop-title');
        const itemPopContent = document.getElementById('item-pop-content');
        const itemForward = document.getElementById('item-forward');
        const loading = document.getElementById('trace-loading');
        const toast = document.getElementById('trace-toast');
        let contacts = [];
        let selectedContact = null;
        let layout = null;
        let activeRoomIndex = 0;
        let clockTimer = 0;
        let toastTimer = 0;
        let generating = false;
        let activeFinding = null;

        function stripEmoji(value) { return String(value == null ? '' : value).replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').replace(/[\uFE0E\uFE0F]/g, ''); }
        function cleanText(value, limit = 900) { return stripEmoji(value).replace(/\s+/g, ' ').trim().slice(0, limit); }
        function escapeText(value) { return cleanText(value).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch] || ch)); }
        function getName(contact) { return cleanText(contact?.name || contact?.title || '未命名', 24) || '未命名'; }
        function getInitial(contact) { return Array.from(getName(contact))[0] || '踪'; }
        function getMeta(contact) { return cleanText(contact?.relationName || contact?.subtitle || contact?.status || contact?.ipCity || contact?.type || 'PRIVATE CONTACT', 48) || 'PRIVATE CONTACT'; }
        function hashText(seed) { let h = 2166136261; const text = String(seed || 'trace'); for (let i = 0; i < text.length; i += 1) { h ^= text.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; } return h >>> 0; }
        function pick(seed, list) { return list[hashText(seed) % list.length]; }
        function layoutKey(contact) { return `rinno:trace:house-monitor:${String(contact?.id || 'default').trim()}:v2`; }
        function storageGet(key) { try { return localStorage.getItem(key); } catch (error) { return ''; } }
        function storageSet(key, value) { try { localStorage.setItem(key, value); } catch (error) {} }
        function readSavedLayout(contact) { const raw = storageGet(layoutKey(contact)); if (!raw) return null; try { const parsed = JSON.parse(raw); return normalizeLayout(parsed, contact); } catch (error) { return null; } }
        function showToast(text) { if (!toast) return; toast.textContent = String(text || ''); toast.classList.add('show'); window.clearTimeout(toastTimer); toastTimer = window.setTimeout(() => toast.classList.remove('show'), 2200); }
        function setLoading(on, text = 'generating room') { generating = Boolean(on); loading.textContent = text; loading.classList.toggle('show', generating); traceRefresh.disabled = generating; traceRefresh.classList.toggle('is-spinning', generating); }
        function normalizeItems(items, seed) {
            const list = Array.isArray(items) ? items : [];
            const normalized = list.map((item, index) => {
                if (typeof item === 'string') return { name: cleanText(item, 18) || `细节${index + 1}`, content: cleanText(item, 360) || '暂时没有更多线索。' };
                return { name: cleanText(item?.name || item?.title || `细节${index + 1}`, 18), content: cleanText(item?.content || item?.detail || item?.description || '暂时没有更多线索。', 420) || '暂时没有更多线索。' };
            }).filter(item => item.name);
            if (normalized.length) return normalized.slice(0, 5);
            return [
                { name: pick(seed + 'itemA', ['门口托盘', '沙发缝隙', '床头抽屉', '桌面便签']), content: pick(seed + 'contentA', ['只留下很浅的生活痕迹，像刚被人顺手整理过。', '有一处被反复碰过的痕迹，内容不多，却很像本人习惯。']) },
                { name: pick(seed + 'itemB', ['未合上的书', '半杯水', '充电线', '外套口袋']), content: pick(seed + 'contentB', ['位置停得很刻意，像是匆忙离开前没来得及收好。', '能看出最近有人在这里停留过，时间不算短。']) }
            ];
        }
        function normalizeLayout(data, contact) {
            if (!data || typeof data !== 'object') return null;
            const seed = [contact?.id, contact?.name, JSON.stringify(data).slice(0, 300)].join('|');
            const areasObj = data.areas && typeof data.areas === 'object' && !Array.isArray(data.areas) ? data.areas : null;
            let sourceRooms = Array.isArray(data.rooms) ? data.rooms : Array.isArray(data.cameras) ? data.cameras : [];
            if (!sourceRooms.length && areasObj) {
                sourceRooms = Object.keys(areasObj).map((name, index) => ({ name, ...(areasObj[name] || {}), camera: `CAM ${String(index + 1).padStart(2, '0')}` }));
            }
            sourceRooms = sourceRooms.filter(Boolean).slice(0, 7);
            if (!sourceRooms.length) return null;
            const rooms = sourceRooms.map((room, index) => {
                const name = cleanText(room.name || room.areaName || room.title || `区域${index + 1}`, 16) || `区域${index + 1}`;
                const roomSeed = seed + name + index;
                const description = cleanText(room.description || room.desc || room.note || '', 240) || pick(roomSeed + 'desc', ['画面压得很低，能看见几处没有完全收好的生活痕迹。', '监控角度很窄，只露出空间的一角和被遮住的私人秩序。']);
                return {
                    id: String(room.id || `room-${index + 1}`),
                    name,
                    camera: cleanText(room.camera || room.cam || `CAM ${String(index + 1).padStart(2, '0')}`, 12),
                    description,
                    note: cleanText(room.note || description, 42),
                    items: normalizeItems(room.items || room.findings || room.clues, roomSeed),
                    hotX: Number(room.hotX || room.hot_x || (24 + (hashText(roomSeed + 'x') % 58))),
                    hotY: Number(room.hotY || room.hot_y || (22 + (hashText(roomSeed + 'y') % 54))),
                    size: index === 1 ? 'large' : 'normal'
                };
            });
            return {
                version: 2,
                contactId: contact?.id || data.contactId || '',
                contactName: getName(contact),
                location: String(data.location || data.address || data.city || '').trim() || `${getName(contact)} 的住所`,
                address: String(data.address || data.location || data.city || contact?.homeAddress || contact?.ipCity || '').trim() || '位置已固定',
                description: String(data.description || data.summary || '').trim() || '监控记录已固定，房间结构会随刷新重新生成。',
                generatedAt: Number(data.generatedAt || Date.now()) || Date.now(),
                fixed: true,
                source: String(data.source || 'local'),
                rooms
            };
        }
        function buildFallbackLayout(contact) {
            const seed = [contact?.id, contact?.name, contact?.profileSetting, contact?.relationDesc, contact?.homeAddress, contact?.ipCity, Date.now()].join('|');
            const city = String(contact?.ipCity || '').trim() || pick(seed + 'city', ['旧城区', '临江区', '南侧公寓群', '内环住宅区', '大学路附近']);
            const homeAddress = String(contact?.homeAddress || '').trim();
            const address = homeAddress || `${city}${pick(seed + 'addr', ['一处高层公寓', '安静小区东塔', '靠街的旧公寓', '带落地窗的单身住所', '低层住宅三楼'])}`;
            const tone = String(contact?.profileSetting || contact?.relationDesc || contact?.subtitle || '').toLowerCase();
            const isPerformer = /主播|直播|镜头|舞台|摄影|拍摄|艺人|演员|网红|model|模特|cos/i.test(tone);
            const isStudent = /学生|大学|校园|研究生|高中|college|student/i.test(tone);
            const isWork = /医生|律师|设计|程序|工程|公司|办公室|编辑|作家|画师|teacher|doctor|lawyer|designer/i.test(tone);
            const roomSets = isPerformer ? ['玄关', '客厅', '化妆台', '卧室', '衣帽角'] : isStudent ? ['玄关', '书桌', '卧室', '小厨房', '阳台'] : isWork ? ['玄关', '工作区', '客厅', '卧室', '厨房'] : ['玄关', '客厅', '卧室', '厨房', '阳台'];
            const notes = {
                '玄关': ['鞋尖朝里，像刚回来不久', '门口灯没关，钥匙还在托盘里', '外套挂得很低，袖口还有褶痕'],
                '客厅': ['沙发一角下陷，茶几上留着半杯水', '窗帘只拉了一半，屏幕反光很浅', '抱枕被压出一道折痕'],
                '卧室': ['床沿有手机充电线，枕头偏向左侧', '床头灯亮度很低，像有人刚离开', '被角没有完全抚平，空气安静'],
                '厨房': ['水槽旁有一只杯子，灯色偏冷', '料理台很干净，只剩一枚便利贴', '冰箱门贴着便签，字迹很轻'],
                '阳台': ['晾衣杆轻晃，窗外有稀薄车灯', '盆栽靠墙，土面还湿着', '栏杆边留着一只空杯'],
                '化妆台': ['镜前散着刷子和一枚发夹', '小灯绕着镜面，亮度被调得很低', '口红没盖紧，旁边压着便签'],
                '衣帽角': ['衣架间距很齐，唯独一件外套露出来', '抽屉留着细缝，像匆忙关上', '香水瓶摆在最外侧'],
                '书桌': ['笔记本摊开，字迹停在半行', '台灯还热，纸页边缘卷起', '耳机线绕在杯底'],
                '小厨房': ['电热壶还插着，杯子靠得很近', '料理台小而干净，留着包装纸', '冰箱顶放着药盒'],
                '工作区': ['椅背搭着外套，屏幕休眠未久', '桌面分区很克制，便签贴在右上角', '文件叠得很薄，钢笔压在上面']
            };
            const rooms = roomSets.map((name, index) => {
                const note = pick(seed + name, notes[name] || ['画面稳定，室内没有明显移动']);
                return { id: `room-${index + 1}`, name, camera: `CAM ${String(index + 1).padStart(2, '0')}`, description: note, note, hotX: 24 + (hashText(seed + name + 'x') % 58), hotY: 22 + (hashText(seed + name + 'y') % 54), size: index === 1 ? 'large' : 'normal', items: normalizeItems([], seed + name) };
            });
            return { version: 2, contactId: contact?.id || '', contactName: getName(contact), location: `${getName(contact)} 的家`, address, description: `${getName(contact)} 的房间结构已固定在监控里。`, generatedAt: Date.now(), fixed: true, source: 'fallback', rooms };
        }
        async function getContactsFromHost() {
            try { const host = window.parent && window.parent !== window ? window.parent : null; const fn = host && (host.rinnoTraceListContacts || host.rinnoMijingListContacts); if (typeof fn === 'function') { const data = await fn.call(host); return Array.isArray(data) ? data : []; } } catch (error) { console.warn('[Trace] contact bridge failed:', error); }
            return [];
        }
        async function generateLayoutFromHost(contact, force) {
            try {
                const host = window.parent && window.parent !== window ? window.parent : null;
                const fn = host && host.rinnoTraceGenerateHouseData;
                if (typeof fn !== 'function') return null;
                const result = await fn.call(host, { contactId: contact?.id || '', contact, force: Boolean(force), requestedAt: Date.now() });
                const data = result?.data || result?.layout || result;
                if (result && result.ok === false && result.message) showToast(result.message);
                return normalizeLayout(data, contact);
            } catch (error) { console.warn('[Trace] generate bridge failed:', error); showToast('生成失败，已使用本地房间逻辑。'); return null; }
        }
        function renderContacts(items) {
            contacts = Array.isArray(items) ? items.filter(item => item && item.id) : [];
            if (traceCount) traceCount.textContent = String(contacts.length);
            if (!traceList) return;
            if (!contacts.length) { traceList.innerHTML = '<div class="trace-empty"><strong>暂无可监控对象</strong>请先到「私叙」通讯录添加联系人，再进入踪迹。</div>'; return; }
            traceList.innerHTML = contacts.map((contact, index) => { const avatar = String(contact.avatar || '').trim(); const avatarStyle = avatar ? ` style="background-image:url(&quot;${escapeText(avatar)}&quot;)"` : ''; return `<button class="trace-target-card" type="button" data-index="${index}"><span class="trace-avatar"${avatarStyle}>${avatar ? '' : escapeText(getInitial(contact))}</span><span><span class="trace-name">${escapeText(getName(contact))}</span><span class="trace-meta">${escapeText(getMeta(contact))}</span></span><span class="trace-arrow">›</span></button>`; }).join('');
        }
        function updateClock() { const now = new Date(); const pad = n => String(n).padStart(2, '0'); if (monitorTime) monitorTime.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`; }
        function renderActiveRoom() {
            if (!layout || !layout.rooms?.length) return;
            const room = layout.rooms[activeRoomIndex] || layout.rooms[0];
            if (monitorCode) monitorCode.textContent = room.camera || `CAM ${activeRoomIndex + 1}`;
            if (monitorRoom) monitorRoom.textContent = room.name || '室内';
            if (monitorNote) monitorNote.textContent = room.note || room.description || 'signal stable';
            if (locationAddress) locationAddress.textContent = room.description || layout.address || '位置已固定';
            if (monitorScreen) { monitorScreen.style.setProperty('--hot-x', `${room.hotX || 50}%`); monitorScreen.style.setProperty('--hot-y', `${room.hotY || 42}%`); }
            cameraStrip.querySelectorAll('.camera-tab').forEach((button, index) => button.setAttribute('aria-pressed', index === activeRoomIndex ? 'true' : 'false'));
            if (floorPlan) floorPlan.querySelectorAll('.floor-room').forEach((button, index) => button.classList.toggle('active', index === activeRoomIndex));
            itemDock.innerHTML = (room.items || []).map((item, index) => `<button class="monitor-item" type="button" data-item-index="${index}">${escapeText(item.name)}</button>`).join('');
            activeFinding = null;
            itemPopover.classList.remove('show');
        }
        async function forwardFindingToHost() {
            if (!selectedContact || !activeFinding) return;
            try {
                const host = window.parent && window.parent !== window ? window.parent : null;
                const fn = host && host.rinnoTraceForwardFinding;
                if (typeof fn !== 'function') { showToast('当前环境无法转发。'); return; }
                const result = await fn.call(host, { contactId: selectedContact.id, contact: selectedContact, finding: activeFinding, forwardedAt: Date.now() });
                if (result && result.ok === false) { showToast(result.message || '转发失败。'); return; }
                showToast('线索已转发到私叙。');
            } catch (error) {
                console.warn('[Trace] forward failed:', error);
                showToast('转发失败，请稍后再试。');
            }
        }
        function renderDashboard(contact, nextLayout) {
            layout = nextLayout || readSavedLayout(contact) || buildFallbackLayout(contact);
            storageSet(layoutKey(contact), JSON.stringify(layout));
            activeRoomIndex = 0;
            currentName.textContent = `${getName(contact)} 的监控`;
            locationName.textContent = layout.location || `${getName(contact)} 的家`;
            locationAddress.textContent = layout.address || '位置已固定';
            if (layoutStatus) layoutStatus.textContent = layout.source === 'api' ? 'ai feed' : 'feed fixed';
            cameraStrip.innerHTML = layout.rooms.map((room, index) => `<button class="camera-tab" type="button" data-room-index="${index}" aria-pressed="${index === 0 ? 'true' : 'false'}"><small>${escapeText(room.camera)}</small><strong>${escapeText(room.name)}</strong></button>`).join('');
            renderActiveRoom();
            updateClock();
            window.clearInterval(clockTimer); clockTimer = window.setInterval(updateClock, 1000);
        }
        async function refreshGeneratedLayout(force = false) {
            if (!selectedContact || generating) return;
            setLoading(true, force ? 'regenerating room' : 'generating room');
            const generated = await generateLayoutFromHost(selectedContact, force);
            const nextLayout = generated || (force ? buildFallbackLayout(selectedContact) : readSavedLayout(selectedContact) || buildFallbackLayout(selectedContact));
            if (force && !generated) nextLayout.source = 'fallback-refresh';
            renderDashboard(selectedContact, nextLayout);
            setLoading(false);
            showToast(force ? '监控房间已刷新。' : '监控房间已固定。');
        }
        function selectContact(contact) {
            selectedContact = contact;
            const saved = readSavedLayout(contact);
            renderDashboard(contact, saved || buildFallbackLayout(contact));
            selectScreen.hidden = true;
            dashboard.hidden = false;
            if (!saved) void refreshGeneratedLayout(false);
        }
        async function resetTraceEntry() {
            selectedContact = null; layout = null; activeRoomIndex = 0; window.clearInterval(clockTimer); dashboard.hidden = true; selectScreen.hidden = false; setLoading(false); itemPopover.classList.remove('show'); renderContacts(await getContactsFromHost());
        }
        traceList.addEventListener('click', event => { const button = event.target.closest?.('[data-index]'); if (!button) return; const contact = contacts[Number(button.getAttribute('data-index'))]; if (contact) selectContact(contact); });
        cameraStrip.addEventListener('click', event => { const button = event.target.closest?.('[data-room-index]'); if (!button) return; activeRoomIndex = Number(button.getAttribute('data-room-index')) || 0; renderActiveRoom(); });
        if (floorPlan) floorPlan.addEventListener('click', event => { const button = event.target.closest?.('[data-room-index]'); if (!button) return; activeRoomIndex = Number(button.getAttribute('data-room-index')) || 0; renderActiveRoom(); });
        itemDock.addEventListener('click', event => { const button = event.target.closest?.('[data-item-index]'); if (!button || !layout?.rooms?.length) return; const room = layout.rooms[activeRoomIndex] || layout.rooms[0]; const item = (room.items || [])[Number(button.getAttribute('data-item-index'))]; if (!item) return; activeFinding = { roomName: cleanText(room.name || '室内', 16), camera: cleanText(room.camera || '', 12), roomDescription: cleanText(room.description || room.note || '', 220), itemName: cleanText(item.name || '细节', 18), content: cleanText(item.content || '暂时没有更多线索。', 420), monitorNote: cleanText(room.note || room.description || '', 80), layoutLocation: cleanText(layout?.location || '', 80), address: cleanText(layout?.address || '', 90) }; itemPopTitle.textContent = activeFinding.itemName; itemPopContent.textContent = activeFinding.content; itemPopover.classList.add('show'); });
        itemForward.addEventListener('click', event => { event.preventDefault(); event.stopPropagation(); void forwardFindingToHost(); });
        monitorScreen.addEventListener('click', event => { if (!event.target.closest('.monitor-item') && !event.target.closest('.item-popover')) itemPopover.classList.remove('show'); });
        traceBack.addEventListener('click', () => { void resetTraceEntry(); });
        traceRefresh.addEventListener('click', () => { void refreshGeneratedLayout(true); });
        window.addEventListener('message', event => { const data = event?.data || {}; if (data.source !== 'rinno-host' || data.frameApp !== 'trace') return; if (data.type === 'reset-view') void resetTraceEntry(); });
        void resetTraceEntry();
    })();
    </script>
