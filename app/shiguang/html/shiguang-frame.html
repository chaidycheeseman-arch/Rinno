<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=overlays-content">
    <title>拾光 - Rinno Memory Console</title>
    <script src="../../../vendor/dexie.js"></script>
    <style>
        :root {
            --paper-bg: #fbf4f1;
            --paper-surface: #fffaf7;
            --paper-surface-alt: #f5e6e2;
            --ink-main: #33282a;
            --ink-sub: #8c6d72;
            --ink-light: #b8949b;
            --accent: #d8aeb5;
            --accent-strong: #8e6570;
            --danger: #a65a68;
            --success: #697f70;
            --border-color: color-mix(in srgb, var(--accent-strong) 16%, var(--paper-surface));
            --shadow-soft: 0 16px 34px color-mix(in srgb, var(--accent-strong) 10%, var(--paper-bg));
            --shadow-hover: 0 20px 42px color-mix(in srgb, var(--accent-strong) 14%, var(--paper-bg));
            --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            --font-serif: "Times New Roman", "Songti SC", Georgia, serif;
            --safe-bottom: env(safe-area-inset-bottom, 24px);
            --sg-bg-a: color-mix(in srgb, var(--paper-bg) 80%, var(--accent) 20%);
            --sg-bg-b: color-mix(in srgb, var(--paper-bg) 94%, white 6%);
            --sg-bg-c: color-mix(in srgb, var(--paper-bg) 78%, var(--paper-surface-alt) 22%);
            --sg-card: color-mix(in srgb, var(--paper-surface) 88%, var(--paper-bg) 12%);
            --sg-card-soft: color-mix(in srgb, var(--paper-surface-alt) 34%, var(--paper-surface) 66%);
            --sg-wash: color-mix(in srgb, var(--accent) 18%, var(--paper-surface) 82%);
            --sg-wash-strong: color-mix(in srgb, var(--accent-strong) 16%, var(--paper-surface) 84%);
            --sg-line: color-mix(in srgb, var(--accent-strong) 18%, var(--paper-surface) 82%);
            --sg-line-soft: color-mix(in srgb, var(--accent) 16%, var(--paper-surface) 84%);
            --sg-radius-xl: 32px;
            --sg-radius-lg: 26px;
            --sg-radius-md: 20px;
            --sg-radius-sm: 15px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            width: 100%;
            min-height: 100%;
            background: var(--sg-bg-b);
            scrollbar-width: none;
        }

        body {
            min-height: 100dvh;
            color: var(--ink-main);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
            background:
                linear-gradient(155deg, var(--sg-bg-a) 0%, var(--sg-bg-b) 48%, var(--sg-bg-c) 100%);
        }

        body::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            display: none;
        }

        button,
        input,
        textarea,
        select {
            font: inherit;
        }

        button {
            border: 0;
        }

        .screen {
            display: none;
            width: 100%;
            min-height: 100dvh;
            animation: screenFadeIn 0.34s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .screen.active {
            display: block;
        }

        @keyframes screenFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .home-kicker,
        .scope-label,
        .detail-hero-kicker,
        .secure-chip,
        .box-label,
        .summary-id,
        .char-no,
        .memory-tag,
        .plot-meta,
        .sg-card-kicker,
        .sg-card-label,
        .sg-reason-label,
        .scope-switch-label,
        .chapter-num {
            font-family: var(--font-serif);
            letter-spacing: 1.8px;
            text-transform: uppercase;
        }

        .home-header {
            position: relative;
            padding: 62px 22px 16px;
        }

        .home-header::after {
            content: '';
            display: block;
            height: 1px;
            margin-top: 18px;
            background: linear-gradient(90deg, var(--sg-bg-b), var(--sg-line), var(--sg-bg-b));
        }

        .home-bar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }

        .home-title,
        .sg-title {
            min-width: 0;
            color: var(--ink-main);
            background: transparent;
            font-family: var(--font-serif);
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            text-align: left;
        }

        .home-title {
            flex: 1;
            font-size: 31px;
            line-height: 1.05;
        }

        .sg-title {
            font-size: 19px;
            line-height: 1.2;
        }

        .home-title:active,
        .sg-title:active,
        .scope-switch-trigger:active,
        .scope-option:active,
        .search-refresh:active,
        .sg-home-tab:active,
        .sg-tab:active,
        .char-card:active,
        .sg-action-button:active,
        .detail-hero-avatar:active {
            transform: translateY(1px);
            opacity: 0.78;
        }

        .home-desc {
            margin-top: 13px;
            max-width: 26em;
            color: var(--ink-sub);
            font-size: 12.5px;
            line-height: 1.85;
            letter-spacing: 0.45px;
        }

        .home-kicker {
            display: none;
        }

        .scope-switch-trigger {
            flex: 0 0 auto;
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            max-width: 152px;
            min-height: 48px;
            padding: 10px 12px;
            border: 1px solid var(--sg-line);
            border-radius: 999px;
            background: var(--sg-card);
            box-shadow: 0 8px 20px color-mix(in srgb, var(--accent-strong) 8%, var(--paper-bg));
            color: var(--ink-main);
            cursor: pointer;
        }

        .scope-switch-trigger:disabled {
            opacity: 0.72;
            cursor: default;
        }

        .scope-switch-label {
            color: var(--ink-light);
            font-size: 9px;
            line-height: 1;
        }

        .scope-switch-value {
            max-width: 100%;
            color: var(--ink-main);
            font-size: 11.5px;
            line-height: 1.35;
            text-align: right;
            word-break: break-all;
        }

        .scope-switch-panel {
            position: fixed;
            top: 76px;
            right: 18px;
            left: 18px;
            z-index: 120;
            max-width: 350px;
            margin-left: auto;
            padding: 10px;
            border: 1px solid var(--sg-line);
            border-radius: 24px;
            background: var(--paper-surface);
            box-shadow: var(--shadow-hover);
        }

        .scope-switch-panel[hidden] {
            display: none;
        }

        .scope-option,
        .scope-option-empty {
            width: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 4px;
            padding: 11px 12px;
            border: 1px solid var(--sg-line-soft);
            border-radius: 18px;
            background: color-mix(in srgb, var(--sg-card-soft) 72%, white 28%);
            color: var(--ink-main);
            text-align: left;
        }

        .scope-option + .scope-option {
            margin-top: 8px;
        }

        .scope-option.is-active {
            border-color: color-mix(in srgb, var(--accent-strong) 36%, var(--paper-surface));
            background: color-mix(in srgb, var(--accent) 14%, var(--paper-surface));
        }

        .scope-option-name {
            font-size: 13px;
            font-weight: 650;
        }

        .scope-option-id,
        .scope-option-empty {
            color: var(--ink-sub);
            font-size: 11.5px;
            line-height: 1.55;
            word-break: break-all;
        }

        .scope-shell {
            display: none;
        }

        .sg-home-tabs {
            position: sticky;
            top: 0;
            z-index: 80;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin: 0 22px 16px;
            padding: 10px;
            border: 1px solid var(--sg-line-soft);
            border-radius: 28px;
            background: var(--paper-surface);
            box-shadow: 0 10px 24px color-mix(in srgb, var(--accent-strong) 8%, var(--paper-bg));
        }

        .sg-home-tab {
            min-height: 40px;
            padding: 0 9px;
            border-radius: 999px;
            background: transparent;
            color: var(--ink-sub);
            font-size: 12px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }

        .sg-home-tab.active {
            background: color-mix(in srgb, var(--accent-strong) 88%, var(--ink-main));
            color: color-mix(in srgb, var(--paper-surface) 86%, white 14%);
            box-shadow: 0 8px 18px color-mix(in srgb, var(--accent-strong) 18%, var(--paper-bg));
        }

        .sg-home-panel {
            display: none;
        }

        .sg-home-panel.active {
            display: block;
        }

        .sg-dashboard,
        .sg-system-list,
        .sg-manage-shell {
            margin: 0 22px;
            padding-bottom: calc(72px + var(--safe-bottom));
        }

        .sg-dashboard-grid,
        .sg-card-list,
        .sg-manage-grid,
        .summary-grid,
        .memory-list,
        .plot-timeline {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .sg-console-card,
        .sg-system-card,
        .sg-manage-card,
        .sg-edit-card,
        .char-card,
        .memory-card,
        .summary-box,
        .empty-state,
        .search-shell,
        .chapter-quote {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--sg-line);
            border-radius: var(--sg-radius-lg);
            background: color-mix(in srgb, var(--paper-surface) 92%, var(--paper-surface-alt) 8%);
            box-shadow: var(--shadow-soft);
        }

        .sg-console-card::before,
        .sg-system-card::before,
        .sg-manage-card::before,
        .sg-edit-card::before,
        .char-card::before,
        .memory-card::before,
        .summary-box::before,
        .empty-state::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
        }

        .sg-console-card,
        .sg-system-card,
        .sg-manage-card,
        .sg-edit-card {
            padding: 18px;
        }

        .sg-card-kicker,
        .sg-card-label,
        .sg-reason-label {
            display: block;
            margin-bottom: 8px;
            color: var(--ink-light);
            font-size: 9.5px;
        }

        .sg-card-title {
            position: relative;
            z-index: 1;
            margin-bottom: 9px;
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 21px;
            font-weight: 500;
            line-height: 1.22;
            letter-spacing: 0.5px;
        }

        .sg-card-text,
        .sg-card-note,
        .sg-reason-text {
            position: relative;
            z-index: 1;
            color: var(--ink-sub);
            font-size: 12.5px;
            line-height: 1.85;
            word-break: break-word;
        }

        .sg-card-text.strong {
            color: var(--ink-main);
            font-size: 13px;
        }

        .sg-stat-row,
        .sg-action-row,
        .sg-chip-row {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .sg-stat-row {
            margin-top: 13px;
        }

        .sg-chip,
        .memory-tag,
        .relation-tag,
        .char-status,
        .char-id-chip,
        .detail-tag {
            display: inline-flex;
            align-items: center;
            max-width: 100%;
            padding: 5px 10px;
            border: 1px solid var(--sg-line-soft);
            border-radius: 999px;
            background: color-mix(in srgb, var(--paper-surface-alt) 42%, var(--paper-surface) 58%);
            color: var(--ink-sub);
            font-size: 10.5px;
            line-height: 1.3;
            letter-spacing: 0.55px;
            white-space: nowrap;
        }

        .sg-chip.solid,
        .relation-tag.solid,
        .char-status.is-rich {
            border-color: color-mix(in srgb, var(--accent-strong) 28%, var(--paper-surface));
            background: color-mix(in srgb, var(--accent-strong) 12%, var(--paper-surface));
            color: color-mix(in srgb, var(--accent-strong) 90%, var(--ink-main));
        }

        .sg-recall-reason {
            position: relative;
            z-index: 1;
            margin-top: 13px;
            padding-top: 12px;
            border-top: 1px dashed var(--sg-line);
        }

        .search-shell {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            margin: 0 22px 14px;
            padding: 12px;
        }

        .search-input,
        .sg-manage-select,
        .sg-manage-input,
        .sg-manage-textarea {
            position: relative;
            z-index: 1;
            width: 100%;
            border: 1px solid var(--sg-line-soft);
            border-radius: 18px;
            background: color-mix(in srgb, var(--paper-surface) 76%, white 24%);
            color: var(--ink-main);
            font-size: 13px;
            outline: none;
        }

        .search-input {
            min-height: 40px;
            padding: 0 13px;
            border-color: transparent;
            background: transparent;
        }

        .search-input::placeholder,
        .sg-manage-input::placeholder,
        .sg-manage-textarea::placeholder {
            color: color-mix(in srgb, var(--ink-light) 86%, var(--paper-surface));
        }

        .search-input:focus,
        .sg-manage-select:focus,
        .sg-manage-input:focus,
        .sg-manage-textarea:focus {
            border-color: color-mix(in srgb, var(--accent-strong) 34%, var(--paper-surface));
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 16%, var(--paper-surface));
        }

        .search-refresh,
        .scope-action,
        .sg-action-button {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 15px;
            border: 1px solid var(--sg-line);
            border-radius: 999px;
            background: color-mix(in srgb, var(--paper-surface) 76%, white 24%);
            color: var(--accent-strong);
            font-size: 12px;
            letter-spacing: 0.65px;
            cursor: pointer;
        }

        .sg-action-button.primary {
            border-color: color-mix(in srgb, var(--accent-strong) 78%, var(--paper-surface));
            background: color-mix(in srgb, var(--accent-strong) 90%, var(--ink-main));
            color: color-mix(in srgb, var(--paper-surface) 84%, white 16%);
        }

        .sg-action-button.danger {
            border-color: color-mix(in srgb, var(--danger) 36%, var(--paper-surface));
            color: var(--danger);
        }

        .sg-action-button[disabled] {
            opacity: 0.48;
            cursor: not-allowed;
        }

        .sg-manage-grid {
            gap: 16px;
        }

        .sg-contact-action-card {
            display: grid;
            gap: 13px;
        }

        .sg-manage-select,
        .sg-manage-input,
        .sg-manage-textarea {
            padding: 12px 13px;
        }

        .sg-manage-textarea {
            min-height: 104px;
            resize: vertical;
            line-height: 1.7;
        }

        .sg-axis-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .sg-axis-line {
            display: grid;
            grid-template-columns: 66px 1fr;
            gap: 10px;
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.6;
        }

        .sg-axis-line strong {
            color: var(--ink-main);
            font-weight: 600;
        }

        .char-list-meta {
            margin: 0 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--ink-sub);
            font-size: 12px;
        }

        .char-list {
            margin: 0;
            padding: 0 22px calc(72px + var(--safe-bottom));
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .char-card {
            min-height: 134px;
            padding: 14px;
            display: grid;
            grid-template-columns: 78px minmax(0, 1fr);
            gap: 14px;
            align-items: stretch;
            text-align: left;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .char-avatar-box,
        .detail-hero-avatar,
        .summary-avatar {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--sg-line);
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--paper-surface-alt) 86%, white 14%), color-mix(in srgb, var(--accent-strong) 10%, var(--paper-surface-alt)));
            color: transparent;
        }

        .char-avatar-box {
            min-height: 106px;
            border-radius: 24px;
        }

        .char-avatar-box.has-image::after,
        .detail-hero-avatar.has-image::after,
        .summary-avatar.has-image::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            background-image: var(--archive-avatar-image);
            background-size: cover;
            background-position: center;
        }

        .char-avatar-box::before,
        .detail-hero-avatar::before,
        .summary-avatar::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            display: none;
        }

        .char-avatar-box span,
        .detail-hero-avatar span,
        .summary-avatar span {
            display: none;
        }

        .char-info {
            position: relative;
            z-index: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 4px 0;
        }

        .char-no {
            display: block;
            margin-bottom: 7px;
            color: var(--ink-light);
            font-size: 9.5px;
        }

        .char-name {
            width: 100%;
            margin-bottom: 8px;
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 500;
            line-height: 1.15;
            letter-spacing: 0.7px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .char-role,
        .char-status,
        .char-id-chip,
        .char-meta-row {
            display: none;
        }

        .char-bio {
            color: var(--ink-sub);
            font-size: 12.2px;
            line-height: 1.72;
            display: -webkit-box;
            overflow: hidden;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .empty-state {
            padding: 24px 20px;
            color: var(--ink-sub);
        }

        .empty-state strong {
            position: relative;
            z-index: 1;
            display: block;
            margin-bottom: 8px;
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 21px;
            font-weight: 500;
        }

        .empty-state p {
            position: relative;
            z-index: 1;
            font-size: 13px;
            line-height: 1.85;
        }

        .sg-header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 58px 22px 0;
            background: var(--sg-bg-b);
            border-bottom: 1px solid var(--sg-line-soft);
        }

        .sg-header-top {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 13px;
        }

        .sg-back-btn,
        .secure-chip,
        .sg-kicker {
            display: none;
        }

        .detail-hero {
            display: grid;
            grid-template-columns: 74px minmax(0, 1fr);
            gap: 16px;
            align-items: center;
            padding: 0 0 16px;
            border-bottom: 1px solid var(--sg-line-soft);
        }

        .detail-hero-avatar {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 22px color-mix(in srgb, var(--accent-strong) 14%, var(--paper-bg));
        }

        .detail-hero-copy {
            min-width: 0;
            display: grid;
            gap: 8px;
        }

        .detail-name {
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 500;
            line-height: 1.08;
            letter-spacing: 0.6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .detail-hero-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px 13px;
            overflow: hidden;
        }

        .detail-meta-line {
            display: inline-grid;
            grid-template-columns: auto auto;
            gap: 7px;
            align-items: baseline;
        }

        .detail-meta-line span {
            color: var(--ink-light);
            font-family: var(--font-serif);
            font-size: 9.5px;
            letter-spacing: 1.6px;
            text-transform: uppercase;
        }

        .detail-meta-line strong {
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.5;
            font-weight: 600;
        }

        .detail-hero-id {
            color: color-mix(in srgb, var(--accent-strong) 86%, var(--ink-main));
            font-family: var(--font-serif);
            font-size: 11px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sg-tabs {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            padding: 10px 0 0;
            scrollbar-width: none;
        }

        .sg-tabs::-webkit-scrollbar {
            display: none;
        }

        .sg-tab {
            position: relative;
            flex: 0 0 auto;
            padding: 12px 2px;
            background: transparent;
            color: var(--ink-light);
            font-size: 14px;
            letter-spacing: 0.8px;
            cursor: pointer;
        }

        .sg-tab.active {
            color: var(--ink-main);
            font-weight: 650;
        }

        .sg-tab.active::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            border-radius: 999px;
            background: color-mix(in srgb, var(--accent-strong) 82%, var(--ink-main));
        }

        .sg-view {
            display: none;
            padding: 24px 22px calc(72px + var(--safe-bottom));
            animation: viewFadeIn 0.3s ease forwards;
        }

        .sg-view.active {
            display: block;
        }

        .memory-list,
        .plot-timeline {
            gap: 16px;
        }

        .memory-card,
        .summary-box {
            padding: 18px;
        }

        .memory-meta {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 68px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .memory-date {
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 28px;
            line-height: 0.95;
            font-weight: 400;
        }

        .memory-date span {
            display: block;
            margin-top: 6px;
            color: var(--ink-light);
            font-size: 10px;
            letter-spacing: 1px;
        }

        .memory-date.is-stage {
            font-size: 16px;
            line-height: 1.35;
            letter-spacing: 0.6px;
        }

        .memory-text,
        .chapter-body,
        .box-value {
            position: relative;
            z-index: 1;
            color: var(--ink-main);
            font-size: 13px;
            line-height: 1.9;
            word-break: break-word;
        }

        .memory-subtext,
        .summary-note {
            position: relative;
            z-index: 1;
            margin-top: 11px;
            padding-top: 11px;
            border-top: 1px dashed var(--sg-line);
            color: var(--ink-sub);
            font-size: 12px;
            line-height: 1.75;
        }

        .memory-tag-row,
        .relation-tags {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 13px;
        }

        .plot-timeline {
            position: relative;
            padding-left: 13px;
        }

        .plot-timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 1px;
            background: linear-gradient(180deg, var(--sg-bg-b), var(--sg-line), var(--sg-bg-b));

        .plot-chapter {
            position: relative;
            margin-left: 0;
            padding: 0 0 20px 22px;
        }

        .plot-chapter::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 6px;
            width: 8px;
            height: 8px;
            border-radius: 50%;

        .chapter-num,
        .plot-meta {
            display: block;
            margin-bottom: 8px;
            color: var(--ink-light);

        }

        .chapter-title {
            margin-bottom: 12px;
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 21px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .chapter-quote {
            margin-bottom: 13px;
            padding: 13px 15px;
            border-left: 3px solid color-mix(in srgb, var(--accent) 72%, var(--accent-strong));
            color: var(--ink-sub);
            font-family: var(--font-serif);
            font-size: 13px;
            line-height: 1.8;
            font-style: italic;
        }

        .plot-meta {
            display: inline-flex;
            margin-top: 12px;
        }

        .summary-header {
            display: block;
            margin: 4px 0 24px;
            text-align: center;
        }

        .summary-avatar {
            width: 84px;
            height: 84px;
            margin: 0 auto 13px;
            border-radius: 50%;
            box-shadow: 0 10px 22px color-mix(in srgb, var(--accent-strong) 14%, var(--paper-bg));
        }

        .summary-name {
            margin-bottom: 6px;
            color: var(--ink-main);
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 500;
        }

        .summary-id {
            color: var(--ink-sub);
            font-size: 10.5px;
        }

        .screen[data-detail-view="view-summary"] .detail-hero {
            display: none;
        }

        .screen[data-detail-view="view-summary"] .sg-header-top {
            margin-bottom: 2px;
        }

        .summary-grid {
            gap: 15px;
        }

        .summary-box.full {
            grid-column: 1 / -1;
        }

        .box-label {
            position: relative;
            z-index: 1;
            display: block;
            margin-bottom: 12px;
            color: var(--ink-light);
            font-size: 9.5px;
        }

        .summary-intimacy-value {
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 500;
            line-height: 1.4;
        }

        .stat-row {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 68px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 13px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-name {
            color: var(--ink-sub);
            font-size: 12px;
        }

        .stat-bar-bg {
            position: relative;
            height: 4px;
            overflow: hidden;
            border-radius: 999px;
            background: color-mix(in srgb, var(--accent-strong) 10%, var(--paper-surface-alt));
        }

        .stat-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-radius: inherit;
            background: color-mix(in srgb, var(--accent-strong) 86%, var(--ink-main));

        .stat-value,
        .id-grid,
        .summary-facts,
        .id-line,

            display: none;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: calc(22px + var(--safe-bottom));
            transform: translateX(-50%);
            z-index: 200;
            max-width: calc(100% - 40px);
            padding: 11px 15px;
            border: 1px solid var(--sg-line);
            border-radius: 999px;
            background: var(--paper-surface);
            box-shadow: var(--shadow-soft);
            color: var(--ink-main);
            font-size: 12px;
            line-height: 1.55;

        .toast[hidden] {
            display: none;
        }

        @media (min-width: 560px) {
            .sg-home-tabs { grid-template-columns: repeat(6, minmax(0, 1fr)); }
            .sg-dashboard-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

            .memory-meta { grid-template-columns: 1fr; gap: 8px; }
            .memory-date { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div id="screen-home" class="screen active">
        <header class="home-header">
            <div class="home-bar">
                <button class="home-title" id="home-title" type="button" aria-label="返回主屏">拾光</button>
                <button class="scope-switch-trigger" id="scope-switch-trigger" type="button" aria-label="切换 user 账号" aria-haspopup="dialog" aria-expanded="false">
                    <span class="scope-switch-label">USER</span>

                </button>
            </div>
            <p class="home-desc" id="home-desc">仅读取当前 user 作用域内的联系人记忆切片与关系档案。</p>
        </header>

        <div class="scope-switch-panel" id="scope-switch-panel" hidden></div>

        <section class="scope-shell" aria-label="当前档案作用域">
            <div class="scope-copy">

                <strong class="scope-value" id="scope-owner-line">载入中…</strong>
                <p class="scope-note" id="scope-owner-note">拾光会强制按当前私叙账号隔离联系人、线程与关系资料。</p>
            </div>

        <nav class="sg-home-tabs" aria-label="拾光管理视图切换">
            <button class="sg-home-tab active" type="button" data-home-view="home-dashboard">今日摘要</button>
            <button class="sg-home-tab" type="button" data-home-view="home-roles">角色记忆</button>
            <button class="sg-home-tab" type="button" data-home-view="home-promises">约定</button>
            <button class="sg-home-tab" type="button" data-home-view="home-core">核心记忆</button>
            <button class="sg-home-tab" type="button" data-home-view="home-recall">召回记录</button>
            <button class="sg-home-tab" type="button" data-home-view="home-manage">管理</button>
        </nav>

        <section class="sg-home-panel active" id="home-dashboard" aria-label="今日线上摘要">
            <div class="sg-dashboard">
                <div class="sg-dashboard-grid" id="dashboard-grid"></div>

        </section>

        <section class="sg-home-panel" id="home-roles" aria-label="角色长期记忆">

                <button class="search-refresh" id="clear-search" type="button" aria-label="清空检索">清空</button>
            </section>

            <div class="char-list-meta">
                <span id="char-list-count">0 个联系人</span>

        </section>

            <div class="sg-system-list"><div class="sg-card-list" id="promise-list"></div></div>
        </section>

        </section>

                <div class="sg-manage-grid">
                    <section class="sg-manage-card sg-contact-action-card">
                        <span class="sg-card-kicker">Memory Control</span>

                        <div class="sg-action-row">
                            <button class="sg-action-button primary" id="manage-immediate-summary" type="button">立即总结</button>
                            <button class="sg-action-button" id="manage-daily-summary" type="button">生成今日线上摘要</button>

                        <p class="sg-card-note">这里调用私叙底层记忆系统；拾光只负责发起、查看和校正，不替代聊天页自动写入。</p>

    <div class="toast" id="archive-toast" hidden></div>

    <script>
        const DB_NAME = 'DeskUIDatabase';
        const PRIVATE_AUTH_ID = 'private_conversation_auth';
        const DOSSIER_STORAGE_KEY = 'rinno_dossier_state_v3';
        const MAX_HOME_CARDS = 24;
        const MAX_THREAD_ITEMS = 60;
        const MAX_MEMORY_ITEMS = 36;
        const ARCHIVE_CAPSULE_PREFIX = '[[RINNO_CAPSULE]]';
        const ARCHIVE_MEMORY_TEXT_LIMIT = 1600;
        const ARCHIVE_STORY_TEXT_LIMIT = 1800;
        const ARCHIVE_DIGEST_TEXT_LIMIT = 420;
        const PROMISE_RE = /(答应|约好|约定|一起|下次|记得|会去|等你|守住|别忘|陪你|等我)/i;
        const SCENE_RE = /(雨|夜|风|海|灯|路|咖啡|地铁|车站|房间|窗|街|花|雪|云|月|清晨|傍晚|晚安|定位|城市|上海|北京|东京|首尔|巴黎|伦敦)/i;

        const elements = {
            homeScreen: document.getElementById('screen-home'),
            detailScreen: document.getElementById('screen-detail'),
            homeDesc: document.getElementById('home-desc'),
            scopeOwnerLine: document.getElementById('scope-owner-line'),
            scopeOwnerNote: document.getElementById('scope-owner-note'),
            scopeSwitchTrigger: document.getElementById('scope-switch-trigger'),
            scopeSwitchCurrent: document.getElementById('scope-switch-current'),
            scopeSwitchPanel: document.getElementById('scope-switch-panel'),
            homeTabs: Array.from(document.querySelectorAll('.sg-home-tab')),
            homePanels: Array.from(document.querySelectorAll('.sg-home-panel')),
            dashboardGrid: document.getElementById('dashboard-grid'),
            promiseList: document.getElementById('promise-list'),
            coreList: document.getElementById('core-list'),
            recallList: document.getElementById('recall-list'),
            manageContactSelect: document.getElementById('manage-contact-select'),
            manageImmediateSummary: document.getElementById('manage-immediate-summary'),
            manageDailySummary: document.getElementById('manage-daily-summary'),
            manageRebuildIndex: document.getElementById('manage-rebuild-index'),
            manageCleanKeyword: document.getElementById('manage-clean-keyword'),
            manageCorrectionText: document.getElementById('manage-correction-text'),
            manageCleanMemory: document.getElementById('manage-clean-memory'),
            manageAppendCorrection: document.getElementById('manage-append-correction'),
            charList: document.getElementById('char-list'),
            charListCount: document.getElementById('char-list-count'),
            charListNote: document.getElementById('char-list-note'),
            searchInput: document.getElementById('archive-search-input'),
            refreshArchive: document.getElementById('refresh-archive'),
            clearSearch: document.getElementById('clear-search'),
            detailTitle: document.getElementById('detail-title'),
            detailName: document.getElementById('detail-name'),
            detailHeroAvatar: document.getElementById('detail-hero-avatar'),
            detailHeroTags: document.getElementById('detail-hero-tags'),
            detailHeroId: document.getElementById('detail-hero-id'),
            memoryList: document.getElementById('memory-list'),
            dailyList: document.getElementById('daily-list'),
            detailPromiseList: document.getElementById('detail-promise-list'),
            detailCoreList: document.getElementById('detail-core-list'),
            detailRecallList: document.getElementById('detail-recall-list'),
            plotTimeline: document.getElementById('plot-timeline'),
            summaryAvatar: document.getElementById('summary-avatar'),
            summaryName: document.getElementById('summary-name-text'),
            summaryId: document.getElementById('summary-id-text'),
            summaryGrid: document.getElementById('summary-grid'),
            toast: document.getElementById('archive-toast'),
            tabs: Array.from(document.querySelectorAll('.sg-tab')),
            views: Array.from(document.querySelectorAll('.sg-view'))
        };

        function createArchiveAudit(overrides = {}) {
            return {
                rawContacts: 0,
                scopedContacts: 0,
                visibleContacts: 0,
                rejectedContacts: 0,
                truncatedContacts: 0,
                rawThreads: 0,
                visibleThreads: 0,
                rejectedThreads: 0,
                truncatedThreads: 0,
                ...overrides
            };
        }

        let archiveState = {
            scope: null,
            scopeOptions: [],
            contacts: [],
            allowedIds: new Set(),
            threads: new Map(),
            userMoments: [],
            audit: createArchiveAudit(),
            query: '',
            homeView: 'home-dashboard'
        };
        let currentDetailId = '';
        let currentDetailView = 'view-memory';
        let homeScrollY = 0;
        let toastTimer = 0;
        let scopeSwitchOpen = false;

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function safeParseJson(value, fallback) {
            if (!value) return fallback;
            if (typeof value === 'object') return value;
            try {
                return JSON.parse(String(value));
            } catch (error) {
                return fallback;
            }
        }

        function isPrivateEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || '').trim());
        }

        function normalizeIdentityId(value) {
            const id = String(value || '').trim();
            return isPrivateEmail(id) ? id.toLowerCase() : id;
        }

        function normalizeOwnerId(value) {
            return normalizeIdentityId(value);
        }

        function normalizeDigits(value) {
            return String(value || '').replace(/[^\d]/g, '').slice(0, 10);
        }

        function normalizeContactId(value, fallback = '') {
            const raw = String(value || fallback || '').trim();
            const source = raw || `contact-${Date.now()}`;
            const stripped = source
                .replace(/^rinno-contact[-:]/i, '')
                .replace(/\s+/g, '-')
                .replace(/[^a-z0-9:_-]/gi, '-')
                .replace(/-+/g, '-')
                .replace(/^-+|-+$/g, '');
            return `rinno-contact-${stripped || `contact-${Date.now()}`}`;
        }

        function normalizeContactSubtitle(value) {
            return String(value || '').replace(/\s+/g, ' ').trim().slice(0, 80);
        }

        function normalizeText(value, maxLength = 220) {
            return String(value || '')
                .replace(/\r/g, '')
                .replace(/\s+\n/g, '\n')
                .replace(/\n\s+/g, '\n')
                .replace(/\n{3,}/g, '\n\n')
                .replace(/[ \t]{2,}/g, ' ')
                .trim()
                .slice(0, maxLength);
        }

        function normalizeArchiveText(value, maxLength = ARCHIVE_MEMORY_TEXT_LIMIT) {
            return String(value || '')
                .replace(/\r/g, '')
                .replace(/\n{3,}/g, '\n\n')
                .trim()
                .slice(0, maxLength);
        }

        function normalizeLifeStages(value) {
            const source = Array.isArray(value) ? value : [];
            return source
                .map(item => {
                    if (!item) return null;
                    const age = normalizeText(item.age || item.stage || item.period || '', 18);
                    const experience = normalizeText(item.experience || item.text || item.story || item.content || '', 240);
                    return experience ? { age: age || '阶段', experience } : null;
                })
                .filter(Boolean)
                .slice(0, 3);
        }

        function normalizeMoments(value) {
            const source = Array.isArray(value) ? value : [];
            return source
                .map((item, index) => {
                    const text = normalizeText(item?.text || '', 220);
                    if (!text) return null;
                    return {
                        id: String(item?.id || `moment-${index}`),
                        title: normalizeText(item?.title || '今日拾光', 40),
                        text,
                        mood: normalizeText(item?.mood || '', 24),
                        time: normalizeText(item?.time || '', 24)
                    };
                })
                .filter(Boolean)
                .slice(0, 16);
        }

        function normalizeImagePayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const src = String(source.src || source.url || source.image || '').trim();
            if (!src) return null;
            return {
                src,
                name: normalizeText(source.name || '', 80)
            };
        }

        function normalizeVoicePayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const transcript = normalizeText(source.transcript || source.content || fallback.content || '', 220);
            if (!transcript) return null;
            return {
                transcript,
                durationSeconds: Math.max(0, Number(source.durationSeconds || source.duration || 0) || 0)
            };
        }

        function normalizeLocationPayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const name = normalizeText(source.name || fallback.content || '', 72);
            const address = normalizeText(source.address || '', 120);
            const note = normalizeText(source.note || '', 80);
            if (!name && !address && !note) return null;
            return { name, address, note };
        }

        function normalizeStickerPayload(value, fallback = {}) {
            const source = value && typeof value === 'object' ? value : fallback;
            const description = normalizeText(source.description || fallback.content || '', 120);
            if (!description) return null;
            return { description, url: String(source.url || '').trim() };
        }

        function normalizeMessageType(item) {
            const type = String(item?.type || '').trim().toLowerCase();
            if (['camera', 'image', 'voice', 'location', 'sticker', 'reply', 'text'].includes(type)) return type;
            if (item?.image?.src || item?.image?.url) return 'image';
            if (item?.voice) return 'voice';
            if (item?.location) return 'location';
            if (item?.sticker) return 'sticker';
            return 'text';
        }

        function normalizeMessages(value) {
            if (!Array.isArray(value)) return [];
            return value
                .slice(0, 240)
                .map((item, index) => {
                    if (!item || typeof item !== 'object') return null;
                    const role = item.role === 'user'
                        ? 'user'
                        : item.role === 'system'
                            ? 'system'
                            : 'assistant';
                    const type = role === 'system' ? 'text' : normalizeMessageType(item);
                    const image = (type === 'camera' || type === 'image') ? normalizeImagePayload(item.image, item.media || item) : null;
                    const voice = type === 'voice' ? normalizeVoicePayload(item.voice, item) : null;
                    const location = type === 'location' ? normalizeLocationPayload(item.location, item) : null;
                    const sticker = type === 'sticker' ? normalizeStickerPayload(item.sticker, item) : null;
                    const content = normalizeText(
                        type === 'voice'
                            ? voice?.transcript || ''
                            : type === 'location'
                                ? [location?.name, location?.address, location?.note].filter(Boolean).join(' · ')
                                : type === 'sticker'
                                    ? sticker?.description || ''
                                    : item.content || item.text || '',
                        1200
                    );
                    if (role === 'system' && content.startsWith(ARCHIVE_CAPSULE_PREFIX)) return null;
                    const recalled = Boolean(item.recalled);
                    const recalledData = recalled && item.recalledData && typeof item.recalledData === 'object'
                        ? {
                            actorName: normalizeText(item.recalledData.actorName || '', 30),
                            actorRole: item.recalledData.actorRole === 'assistant' ? 'assistant' : 'user',
                            content: normalizeText(item.recalledData.content || '', 220),
                            createdAt: Number(item.recalledData.createdAt) || 0,
                            wasCaught: Boolean(item.recalledData.wasCaught)
                        }
                        : null;
                    if (!content && !image && !voice && !location && !sticker && !(recalled && recalledData)) return null;
                    return {
                        id: String(item.id || `message-${index}`),
                        role,
                        type,
                        content,
                        image,
                        voice,
                        location,
                        sticker,
                        createdAt: Number(item.createdAt) || Date.now(),
                        translation: role === 'assistant' ? normalizeText(item.translation || item.translation_zh || item.translationZh || '', 260) : '',
                        recalled,
                        recalledData
                    };
                })
                .filter(Boolean);
        }

        function normalizeThreads(value) {
            if (!Array.isArray(value)) return [];
            return value
                .map((item, index) => {
                    if (!item || typeof item !== 'object') return null;
                    const contactId = normalizeContactId(item.contactId || item.peerId || `thread-${index}`);
                    const messages = normalizeMessages(item.messages);
                    return {
                        id: String(item.id || `contact-chat:${contactId}`),
                        contactId,
                        draft: normalizeText(item.draft || '', 800),
                        unread: Math.max(0, Number(item.unread) || 0),
                        updatedAt: Number(item.updatedAt) || messages[messages.length - 1]?.createdAt || 0,
                        messages
                    };
                })
                .filter(Boolean);
        }

        function normalizeContacts(value, scopeId) {
            const source = Array.isArray(value) ? value : [];
            const contacts = [];
            const seenIds = new Set();
            source.forEach((item, index) => {
                if (!item || typeof item !== 'object') return;
                const normalizedOwnerId = normalizeOwnerId(item.ownerId || item.owner || '');
                if (scopeId && normalizedOwnerId && normalizedOwnerId !== scopeId) return;
                const id = normalizeContactId(item.id || item.recordId || item.accountId || `contact-${index}`);
                if (seenIds.has(id)) return;
                seenIds.add(id);
                contacts.push({
                    id,
                    ownerId: normalizedOwnerId || scopeId,
                    type: String(item.type || 'contact'),
                    title: normalizeText(item.title || item.name || '未命名联系人', 32),
                    subtitle: normalizeContactSubtitle(item.subtitle || ''),
                    note: normalizeText(item.note || '', 240),
                    accountId: normalizeDigits(item.accountId || item.publicId || ''),
                    dossierType: String(item.dossierType || '').toLowerCase() === 'npc' ? 'npc' : 'char',
                    dossierRecordId: String(item.dossierRecordId || item.recordId || '').trim(),
                    avatar: String(item.avatar || '').trim(),
                    homepageCover: String(item.homepageCover || item.cover || '').trim(),
                    profession: normalizeText(item.profession || item.job || '', 24),
                    signature: normalizeText(item.signature || item.personaSignature || item.tagline || '', 32),
                    nationality: normalizeText(item.nationality || item.country || '', 32),
                    phoneNumber: normalizeText(item.phoneNumber || item.phone || '', 32),
                    ipCity: normalizeText(item.ipCity || item.ipLocation || item.city || '', 32),
                    homeAddress: normalizeText(item.homeAddress || item.address || '', 80),
                    lifeStages: normalizeLifeStages(item.lifeStages || item.ageStages || item.experiences || []),
                    summaryMemory: normalizeArchiveText(item.summaryMemory || item.memorySummary || '', ARCHIVE_MEMORY_TEXT_LIMIT),
                    summaryStory: normalizeArchiveText(item.summaryStory || item.storySummary || '', ARCHIVE_STORY_TEXT_LIMIT),
                    summaryDigest: normalizeArchiveText(item.summaryDigest || item.relationshipSummary || '', ARCHIVE_DIGEST_TEXT_LIMIT),
                    summaryUpdatedAt: Math.max(0, Number(item.summaryUpdatedAt || item.archiveUpdatedAt) || 0)
                });
            });
            return contacts;
        }

        function normalizeDossierState(value) {
            const source = value && typeof value === 'object' ? value : {};
            const list = type => (Array.isArray(source[type]) ? source[type] : []).map(item => ({
                ...item,
                type,
                id: String(item?.id || '').trim(),
                publicId: normalizeDigits(item?.publicId || ''),
                name: normalizeText(item?.name || '', 32),
                nickname: normalizeText(item?.nickname || '', 32),
                avatar: String(item?.avatar || '').trim(),
                setting: normalizeText(item?.setting || item?.note || '', 900),
                monologue: normalizeText(item?.monologue || '', 520),
                gender: normalizeText(item?.gender || '', 16),
                nationality: normalizeText(item?.nationality || '', 28),
                role: normalizeText(item?.role || '', 42),
                tags: Array.isArray(item?.tags) ? item.tags.map(tag => normalizeText(tag, 16)).filter(Boolean).slice(0, 8) : [],
                relation: normalizeText(item?.relation || '', 64),
                note: normalizeText(item?.note || '', 220),
                rinnoMemorySummary: normalizeArchiveText(item?.rinnoMemorySummary || item?.memorySummary || '', ARCHIVE_MEMORY_TEXT_LIMIT),
                rinnoStorySummary: normalizeArchiveText(item?.rinnoStorySummary || item?.storySummary || '', ARCHIVE_STORY_TEXT_LIMIT),
                rinnoSummaryDigest: normalizeArchiveText(item?.rinnoSummaryDigest || item?.relationshipSummary || '', ARCHIVE_DIGEST_TEXT_LIMIT),
                rinnoSummaryUpdatedAt: Math.max(0, Number(item?.rinnoSummaryUpdatedAt || item?.summaryUpdatedAt) || 0),
                socialFollowers: Number(item?.socialFollowers) || 0,
                socialFollowing: Number(item?.socialFollowing) || 0,
                socialOthers: Number(item?.socialOthers) || 0,
                followedBy: Array.isArray(item?.followedBy) ? item.followedBy.map(name => normalizeText(name, 18)).filter(Boolean).slice(0, 3) : []
            }));
            return {
                char: list('char'),
                npc: list('npc'),
                network: source.network && typeof source.network === 'object' ? source.network : { nodes: [], links: [] }
            };
        }

        function getActiveIdentityId(rawState) {
            const slots = rawState && typeof rawState.identities === 'object' ? rawState.identities : {};
            const normalizedKeys = Object.keys(slots).map(normalizeIdentityId).filter(Boolean);
            const candidates = [
                rawState?.lastAccountId,
                rawState?.email,
                rawState?.userPresetId
            ].map(normalizeIdentityId).filter(Boolean);
            for (const candidate of candidates) {
                if (normalizedKeys.includes(candidate)) return candidate;
            }
            return candidates[0] || normalizedKeys[0] || '';
        }

        function buildDossierIndexes(state) {
            const records = [...state.char, ...state.npc];
            const byRecord = new Map();
            const byPublicId = new Map();
            records.forEach(record => {
                if (record.id) byRecord.set(`${record.type}:${record.id}`, record);
                if (record.publicId) byPublicId.set(record.publicId, record);
            });
            return { records, byRecord, byPublicId };
        }

        function getNetworkNodeKey(node) {
            if (!node || typeof node !== 'object') return '';
            const kind = String(node.kind || '').trim().toLowerCase();
            const refId = String(node.refId || '').trim();
            if ((kind === 'char' || kind === 'npc') && refId) return `${kind}:${refId}`;
            if (kind === 'user') return 'user';
            return '';
        }

        function buildRelationIndex(network) {
            const nodes = Array.isArray(network?.nodes) ? network.nodes : [];
            const links = Array.isArray(network?.links) ? network.links : [];
            const nodeMap = new Map(nodes.map(node => [String(node?.id || '').trim(), node]));
            const relationMap = new Map();
            links.forEach(link => {
                const fromNode = nodeMap.get(String(link?.from || '').trim());
                const toNode = nodeMap.get(String(link?.to || '').trim());
                const fromKey = getNetworkNodeKey(fromNode);
                const toKey = getNetworkNodeKey(toNode);
                const relationData = {
                    label: normalizeText(link?.relation || '', 40),
                    note: normalizeText(link?.description || '', 220)
                };
                if (!relationData.label && !relationData.note) return;
                if (fromKey === 'user' && toKey && !relationMap.has(toKey)) relationMap.set(toKey, relationData);
                if (toKey === 'user' && fromKey && !relationMap.has(fromKey)) relationMap.set(fromKey, relationData);
                if (fromKey && toKey && fromKey !== 'user' && !relationMap.has(fromKey)) relationMap.set(fromKey, relationData);
                if (toKey && fromKey && toKey !== 'user' && !relationMap.has(toKey)) relationMap.set(toKey, relationData);
            });
            return relationMap;
        }

        function buildArchiveScopeOptions(privateState, activeId, fallbackScopeId = '') {
            const slots = privateState && typeof privateState.identities === 'object' ? privateState.identities : {};
            const options = Object.entries(slots)
                .map(([rawId, slot]) => {
                    const id = normalizeIdentityId(rawId);
                    if (!id) return null;
                    return {
                        id,
                        displayName: normalizeText(slot?.nickname || slot?.userPresetName || slot?.name || '未命名用户', 32),
                        avatar: String(slot?.avatar || '').trim(),
                        active: id === activeId
                    };
                })
                .filter(Boolean)
                .sort((left, right) => {
                    if (left.active !== right.active) return left.active ? -1 : 1;
                    return String(left.displayName || '').localeCompare(String(right.displayName || ''), 'zh-CN');
                });
            if (!options.length && fallbackScopeId) {
                options.push({
                    id: fallbackScopeId,
                    displayName: normalizeText(privateState?.nickname || privateState?.userPresetName || '当前用户', 32),
                    avatar: String(privateState?.avatar || '').trim(),
                    active: true
                });
            }
            return options;
        }

        function findDossierRecord(contact, indexes) {
            if (contact.dossierRecordId) {
                const record = indexes.byRecord.get(`${contact.dossierType}:${contact.dossierRecordId}`);
                if (record) return record;
            }
            if (contact.accountId) {
                const record = indexes.byPublicId.get(contact.accountId);
                if (record) return record;
            }
            return null;
        }

        function createFallbackSignature(record = null, contact = null) {
            const source = `${record?.setting || ''} ${record?.monologue || ''} ${contact?.note || ''}`.toLowerCase();
            if (/(温柔|细腻|照顾|安静|慢)/i.test(source)) return '慢一点靠近，也会认真回应';
            if (/(冷|克制|疏离|沉默|隐忍)/i.test(source)) return '不轻易靠近，也不轻易忘记';
            if (/(艺术|音乐|摄影|诗|画|浪漫)/i.test(source)) return '把情绪藏进光影与留白里';
            return '把距离放轻，把真心放深';
        }

        function formatAbsoluteDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';
            const month = date.toLocaleString('en-US', { month: 'short' }).toUpperCase();
            return `${date.getDate().toString().padStart(2, '0')} ${month} ${date.getFullYear()}`;
        }

        function formatMonthDay(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return { major: '—', minor: 'DATE' };
            return {
                major: String(date.getDate()).padStart(2, '0'),
                minor: date.toLocaleString('en-US', { month: 'short' }).toUpperCase()
            };
        }

        function formatTimeAgo(value) {
            const timestamp = Number(value) || 0;
            if (!timestamp) return '未建立时间线';
            const diff = Date.now() - timestamp;
            const day = 24 * 60 * 60 * 1000;
            if (diff < 60 * 1000) return '刚刚';
            if (diff < 60 * 60 * 1000) return `${Math.max(1, Math.floor(diff / (60 * 1000)))} 分钟前`;
            if (diff < day) return `${Math.max(1, Math.floor(diff / (60 * 60 * 1000)))} 小时前`;
            if (diff < day * 7) return `${Math.max(1, Math.floor(diff / day))} 天前`;
            return formatAbsoluteDate(timestamp);
        }

        function formatCount(value) {
            return Number(value || 0).toLocaleString('en-US');
        }

        function enrichContact(contact, thread, record, relation, scopeId, savedLongMemory = null) {
            const messages = Array.isArray(thread?.messages) ? thread.messages : [];
            const firstMessage = messages[0] || null;
            const lastMessage = messages[messages.length - 1] || null;
            const title = contact.title || record?.nickname || record?.name || '未命名联系人';
            const subtitle = relation?.label
                || contact.subtitle
                || record?.role
                || (contact.accountId ? `ID ${contact.accountId}` : '关系待补全');
            const signature = contact.signature || record?.relation || createFallbackSignature(record, contact);
            const note = contact.note || record?.setting || record?.monologue || '还没有留下更多上下文。';
            const nationality = contact.nationality || record?.nationality || '';
            const tags = [
                ...(Array.isArray(record?.tags) ? record.tags : []),
                contact.profession || '',
                nationality,
                relation?.label || '',
                signature
            ].map(tag => normalizeText(tag, 18)).filter(Boolean);
            const uniqueTags = [...new Set(tags)].slice(0, 5);
            const activeDays = new Set(messages.map(message => {
                const date = new Date(message.createdAt);
                return Number.isNaN(date.getTime()) ? '' : date.toISOString().slice(0, 10);
            }).filter(Boolean)).size;
            const richCount = messages.filter(message => ['camera', 'image', 'voice', 'location', 'sticker'].includes(message.type)).length;
            let status = 'EMPTY';
            if (messages.length >= 12) status = 'RECORDED';
            else if (messages.length >= 4 || record) status = 'SYNCED';
            return {
                ...contact,
                ownerId: scopeId,
                title,
                subtitle,
                note,
                signature,
                nationality,
                avatar: contact.avatar || record?.avatar || '',
                accountId: contact.accountId || record?.publicId || '',
                record,
                relation,
                tags: uniqueTags,
                messageCount: messages.length,
                activeDays,
                richCount,
                firstActiveAt: firstMessage?.createdAt || 0,
                lastActiveAt: lastMessage?.createdAt || 0,
                firstMessage,
                lastMessage,
                status,
                socialFollowers: Number(record?.socialFollowers) || 0,
                socialFollowing: Number(record?.socialFollowing) || 0,
                socialOthers: Number(record?.socialOthers) || 0,
                followedBy: Array.isArray(record?.followedBy) ? record.followedBy : [],
                lifeStages: contact.lifeStages.length ? contact.lifeStages : normalizeLifeStages(record?.lifeStages || []),
                summaryMemory: normalizeArchiveText(contact.summaryMemory || record?.rinnoMemorySummary || '', ARCHIVE_MEMORY_TEXT_LIMIT),
                summaryStory: normalizeArchiveText(contact.summaryStory || record?.rinnoStorySummary || '', ARCHIVE_STORY_TEXT_LIMIT),
                summaryDigest: normalizeArchiveText(contact.summaryDigest || record?.rinnoSummaryDigest || '', ARCHIVE_DIGEST_TEXT_LIMIT),
                summaryUpdatedAt: Math.max(0, Number(contact.summaryUpdatedAt || record?.rinnoSummaryUpdatedAt) || 0),
                longMemory: mergeLongMemoryState(contact.longMemory || {}, savedLongMemory || {}, contact.id)
            };
        }

        function buildArchiveScope(privateState, dossierState, longMemoryRecords = []) {
            const normalizedDossier = normalizeDossierState(dossierState);
            const activeId = getActiveIdentityId(privateState);
            const slots = privateState && typeof privateState.identities === 'object' ? privateState.identities : {};
            const slot = activeId && slots[activeId] && typeof slots[activeId] === 'object' ? slots[activeId] : null;
            const scopeId = activeId || normalizeIdentityId(privateState?.email || privateState?.userPresetId || 'local');
            const scopeOptions = buildArchiveScopeOptions(privateState, activeId, scopeId);
            const rawContacts = slot?.contacts || privateState?.contacts || [];
            const rawThreads = slot?.threads || privateState?.threads || [];
            const scopedContacts = normalizeContacts(rawContacts, scopeId);
            const contacts = scopedContacts.slice(0, MAX_HOME_CARDS);
            const allowedIds = new Set(contacts.map(contact => contact.id));
            const normalizedThreads = normalizeThreads(rawThreads);
            const inScopeThreads = normalizedThreads.filter(thread => allowedIds.has(thread.contactId));
            const visibleThreads = inScopeThreads.slice(0, MAX_THREAD_ITEMS);
            const threadMap = new Map(visibleThreads.map(thread => [thread.contactId, thread]));
            const dossierIndexes = buildDossierIndexes(normalizedDossier);
            const relationIndex = buildRelationIndex(normalizedDossier.network);
            const longMemoryMap = new Map((Array.isArray(longMemoryRecords) ? longMemoryRecords : [])
                .map(item => normalizeLongMemoryState(item, item?.charId || 'contact_memory'))
                .map(item => [item.charId, item]));
            const enrichedContacts = contacts
                .map(contact => {
                    const record = findDossierRecord(contact, dossierIndexes);
                    const relationKey = contact.dossierRecordId ? `${contact.dossierType}:${contact.dossierRecordId}` : '';
                    const relation = relationKey ? relationIndex.get(relationKey) || null : null;
                    return enrichContact(contact, threadMap.get(contact.id), record, relation, scopeId, longMemoryMap.get(contact.id));
                })
                .sort((left, right) => {
                    if ((right.lastActiveAt || 0) !== (left.lastActiveAt || 0)) return (right.lastActiveAt || 0) - (left.lastActiveAt || 0);
                    return String(left.title || '').localeCompare(String(right.title || ''), 'zh-CN');
                });
            const finalAllowedIds = new Set(enrichedContacts.map(contact => contact.id));
            return {
                scope: {
                    id: scopeId,
                    displayName: normalizeText(slot?.nickname || slot?.userPresetName || privateState?.nickname || privateState?.userPresetName || '我', 32),
                    avatar: String(slot?.avatar || privateState?.avatar || '').trim(),
                    bio: normalizeText(slot?.profileBio || privateState?.profileBio || '', 120)
                },
                scopeOptions,
                contacts: enrichedContacts,
                allowedIds: finalAllowedIds,
                threads: new Map(visibleThreads
                    .filter(thread => finalAllowedIds.has(thread.contactId))
                    .map(thread => [thread.contactId, thread])),
                userMoments: normalizeMoments(slot?.moments || privateState?.moments || []),
                audit: createArchiveAudit({
                    rawContacts: Array.isArray(rawContacts) ? rawContacts.length : 0,
                    scopedContacts: scopedContacts.length,
                    visibleContacts: contacts.length,
                    rejectedContacts: Math.max(0, (Array.isArray(rawContacts) ? rawContacts.length : 0) - scopedContacts.length),
                    truncatedContacts: Math.max(0, scopedContacts.length - contacts.length),
                    rawThreads: normalizedThreads.length,
                    visibleThreads: visibleThreads.length,
                    rejectedThreads: Math.max(0, normalizedThreads.length - inScopeThreads.length),
                    truncatedThreads: Math.max(0, inScopeThreads.length - visibleThreads.length)
                }),
                dossier: normalizedDossier
            };
        }

        function getSharedDb() {
            try {
                if (window.parent && window.parent !== window && window.parent.db?.edits) return window.parent.db;
            } catch (error) {
                return null;
            }
            return null;
        }

        function createLocalDb() {
            if (typeof window.Dexie !== 'function') throw new Error('Dexie 未加载，无法读取本机档案。');
            const db = new window.Dexie(DB_NAME);
            db.version(1).stores({
                edits: 'id',
                layout: 'cid'
            });
            db.version(2).stores({
                edits: 'id',
                layout: 'cid',
                characterAdvancedSettings: 'charId, updatedAt'
            });
            db.version(3).stores({
                edits: 'id',
                layout: 'cid',
                characterAdvancedSettings: 'charId, updatedAt',
                characterLongMemory: 'charId, updatedAt, lastActiveDate'
            });
            db.version(4).stores({
                edits: 'id',
                layout: 'cid',
                characterAdvancedSettings: 'charId, updatedAt',
                characterLongMemory: 'charId, updatedAt, lastActiveDate',
                offlineSettings: 'charId, updatedAt, lastAutoInviteAt, lastDeclinedAt',
                offlineInvites: 'inviteId, charId, status, createdAt, updatedAt',
                offlineSessions: 'sessionId, inviteId, charId, source, startedAt, endedAt',
                offlineMessages: 'id, sessionId, charId, role, createdAt'
            });
            return db;
        }

        async function readArchiveRecords() {
            const sharedDb = getSharedDb();
            const db = sharedDb || createLocalDb();
            const [privateRecord, dossierRecord, longMemoryRecords] = await Promise.all([
                db.edits.get(PRIVATE_AUTH_ID),
                db.edits.get(DOSSIER_STORAGE_KEY),
                db.characterLongMemory?.toArray ? db.characterLongMemory.toArray() : Promise.resolve([])
            ]);
            const privateState = safeParseJson(privateRecord?.content || privateRecord || {}, {});
            const dossierState = safeParseJson(dossierRecord?.content || dossierRecord || {}, {});
            return buildArchiveScope(privateState, dossierState, longMemoryRecords);
        }

        function setAvatarSurface(element, avatar, fallback) {
            const seed = createAvatarSeed(element?.dataset?.avatarSeed || fallback || '');
            const safeAvatar = String(avatar || '').trim();
            element.style.setProperty('--archive-avatar-gradient', seed);
            element.classList.toggle('has-image', Boolean(safeAvatar));
            if (safeAvatar) {
                element.style.setProperty('--archive-avatar-image', `url("${safeAvatar.replace(/"/g, '&quot;')}")`);
            } else {
                element.style.removeProperty('--archive-avatar-image');
            }
            const holder = element.querySelector('span');
            if (holder) holder.textContent = '';
        }

        function createAvatarSeed(value) {
            const source = String(value || 'rinno').trim() || 'rinno';
            let hash = 0;
            for (let index = 0; index < source.length; index += 1) {
                hash = ((hash * 33) + source.charCodeAt(index)) >>> 0;
            }
            const angle = 118 + (hash % 72);
            const glowX = 18 + (hash % 24);
            const glowY = 16 + ((hash >> 3) % 24);
            const shadowX = 82 - ((hash >> 5) % 24);
            const shadowY = 80 - ((hash >> 7) % 24);
            const accentMix = 14 + (hash % 14);
            const strongMix = 10 + ((hash >> 2) % 10);
            return [
                `linear-gradient(${angle}deg, color-mix(in srgb, var(--paper-surface-alt) 78%, var(--paper-surface) 22%), color-mix(in srgb, var(--accent) ${accentMix}%, var(--paper-surface-alt)), color-mix(in srgb, var(--accent-strong) ${strongMix}%, var(--paper-surface-alt)))`
            ].join(', ');
        }

            const sharedDb = getSharedDb();

            const privateRecord = await db.edits.get(PRIVATE_AUTH_ID);
            const privateState = safeParseJson(privateRecord?.content || privateRecord || {}, {});
            privateState.lastAccountId = nextScopeId;
            const nextRecord = privateRecord && typeof privateRecord === 'object' && privateRecord.id
                ? { ...privateRecord, content: JSON.stringify(privateState) }
                : { id: PRIVATE_AUTH_ID, content: JSON.stringify(privateState) };
            await db.edits.put(nextRecord);

        function scoreRecallPreview(entry = {}, contact = {}) {
            const thread = archiveState.threads.get(contact.id) || { messages: [] };
            const recent = thread.messages.slice(-8).map(message => message.content || createMemorySnippet(message)).join(' ');
            const haystack = [entry.text, entry.axis?.when, entry.axis?.feel, entry.axis?.who, entry.axis?.what, entry.axis?.where, ...(entry.tags || [])].filter(Boolean).join(' ').toLowerCase();
            const tokens = [...new Set(String(recent || '').toLowerCase().split(/[\s，。！？、,.!?;；：:（）()\[\]「」『』]+/g).map(item => item.trim()).filter(item => item.length >= 2))].slice(-18);
            const overlap = tokens.length ? tokens.reduce((total, token) => total + (haystack.includes(token) ? 1 : 0), 0) / tokens.length : 0.18;
            const now = Date.now();
            const ageDays = Math.max(0, (now - (Number(entry.updatedAt || entry.createdAt) || now)) / 86400000);
            const recency = Math.max(0, 1 - Math.min(ageDays, 90) / 90);
            const emotional = (Number(entry.emotionalWeight) || 0) / 100;
            const relation = (Number(entry.relationWeight) || 0) / 100;
            const frequency = Math.min(1, Math.log1p(Number(entry.recallCount) || 0) / Math.log(8));
            const core = entry.core || entry.decayProtected ? 1 : 0;
            const score = (emotional * 0.30) + (recency * 0.20) + (Math.max(overlap, 0.18) * 0.25) + (frequency * 0.10) + (core * 0.15) + (relation * 0.08);
            return Number(score.toFixed(4));
        }

        function createRecallReason(entry = {}, contact = {}) {
            const reasons = [];
            if (entry.core || entry.decayProtected) reasons.push('核心保护记忆');
            if ((Number(entry.emotionalWeight) || 0) >= 70) reasons.push(`情感权重 ${entry.emotionalWeight}`);
            if ((Number(entry.relationWeight) || 0) >= 70) reasons.push(`关系权重 ${entry.relationWeight}`);
            if ((Number(entry.recallCount) || 0) > 0) reasons.push(`历史召回 ${entry.recallCount} 次`);
            if (entry.lastRecalledAt) reasons.push(`最近召回 ${formatTimeAgo(entry.lastRecalledAt)}`);
            const axis = entry.axis || {};
            const axisHits = [axis.when && '时间', axis.feel && '情绪', axis.who && '关系', axis.what && '语义', axis.where && '场景'].filter(Boolean);
            if (axisHits.length) reasons.push(`五维命中：${axisHits.join(' / ')}`);
            if (entry.tags?.length) reasons.push(`标签：${entry.tags.slice(0, 4).join('、')}`);
            return reasons.join('；') || '因为它与最近上下文、情绪或关系状态存在弱关联。';
        }
