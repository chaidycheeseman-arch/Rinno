        function createMemorySnippet(message) {
            if (message.recalled && message.recalledData) {
                const actor = message.recalledData.actorRole === 'assistant' ? (message.recalledData.actorName || '联系人') : '你';
                return `${actor}撤回了一条消息：${message.recalledData.content || '已保留本地撤回记录。'}`;
            }
            if (message.type === 'voice') return `[语音] ${message.voice?.transcript || message.content}`;
            if (message.type === 'location') return `[定位] ${message.content}`;
            if (message.type === 'camera') return `[相机照片] ${message.image?.name || message.content || '留下了一张照片'}`;
            if (message.type === 'image') return `[图片] ${message.image?.name || message.content || '发送了一张图片'}`;
            if (message.type === 'sticker') return `[表情包] ${message.sticker?.description || message.content}`;
            return message.content;
        }

        function getMessageTag(message) {
            if (message.recalled && message.recalledData) return '# 撤回记录';
            if (message.role === 'assistant') {
                return message.type === 'text' ? '# 对方回复' : '# 对方留痕';
            }
            if (message.role === 'user') {
                return message.type === 'text' ? '# 你的发言' : '# 你的留痕';
            }
            return '# 系统片段';
        }

        function splitArchiveParagraphs(value, limit = 4) {
            const text = normalizeArchiveText(value, ARCHIVE_STORY_TEXT_LIMIT);
            if (!text) return [];
            const paragraphs = text
                .split(/\n{2,}/)
                .map(part => part.trim())
                .filter(Boolean);
            if (paragraphs.length > 1) return paragraphs.slice(0, limit);
            return text
                .split(/(?<=[。！？!?])/)
                .map(part => part.trim())
                .filter(Boolean)
                .slice(0, limit);
        }

        function buildMemoryItems(contact) {
            const longMemory = getContactLongMemory(contact);
            const memoryItems = longMemory.entries.map((entry, index) => ({
                id: entry.id || `long-memory:${contact.id}:${index}`,
                sortKey: Number(entry.updatedAt || entry.createdAt) || 0,
                stage: entry.core || entry.decayProtected ? 'CORE' : `MEM ${String(index + 1).padStart(2, '0')}`,
                text: entry.text,
                tag: entry.core || entry.decayProtected ? '# 核心保护' : '# 长期记忆',
                subtext: createRecallReason(entry, contact),
                stamp: `score ${scoreRecallPreview(entry, contact)}`,
                axis: entry.axis,
                chips: [entry.source || 'summary', `情感 ${entry.emotionalWeight}`, `关系 ${entry.relationWeight}`]
            }));
            if (!memoryItems.length) {
                const summaryBlocks = splitArchiveParagraphs(contact.summaryMemory, 6);
                summaryBlocks.forEach((text, index) => memoryItems.push({
                    id: `summary-memory:${contact.id}:${index}`,
                    sortKey: summaryBlocks.length - index,
                    stage: `MEM ${String(index + 1).padStart(2, '0')}`,
                    text,
                    tag: '# 旧归档',
                    subtext: '',
                    stamp: contact.summaryUpdatedAt ? formatAbsoluteDate(contact.summaryUpdatedAt) : '拾光总结'
                }));
            }
            const thread = archiveState.threads.get(contact.id) || { messages: [] };
            thread.messages.forEach(message => {
                memoryItems.push({
                    id: `message:${message.id}`,
                    sortKey: Number(message.createdAt) || 0,
                    majorMinor: formatMonthDay(message.createdAt),
                    text: createMemorySnippet(message),
                    tag: getMessageTag(message),
                    subtext: message.translation || '',
                    stamp: formatAbsoluteDate(message.createdAt)
                });
            });
            contact.lifeStages.forEach((stage, index) => {
                memoryItems.push({
                    id: `life:${index}`,
                    sortKey: -1000000 + index,
                    stage: stage.age || '阶段',
                    text: stage.experience,
                    tag: '# 成长片段',
                    subtext: contact.signature || '',
                    stamp: '角色资料延伸'
                });
            });
            if (!memoryItems.length) {
                memoryItems.push({
                    id: 'profile:fallback',
                    sortKey: -2000000,
                    stage: '档案',
                    text: contact.note || '这份档案还没有聊天内容，只有静态资料。',
                    tag: '# 档案占位',
                    subtext: contact.signature || '当前联系人还没有生成可回放的时间线。',
                    stamp: '待补全'
                });
            }
            return memoryItems
                .sort((left, right) => right.sortKey - left.sortKey)
                .slice(0, MAX_MEMORY_ITEMS);
        }

        function renderMemory(contact) {
            const memoryItems = buildMemoryItems(contact);
            if (!memoryItems.length) {
                elements.memoryList.innerHTML = createEmptyStateMarkup('暂无记忆', '还没有为这个联系人生成拾光记忆。');
                return;
            }
            elements.memoryList.innerHTML = memoryItems.map(item => {
                const dateMarkup = item.majorMinor
                    ? `<div class="memory-date">${escapeHtml(item.majorMinor.major)}<span>${escapeHtml(item.majorMinor.minor)}</span></div>`
                    : `<div class="memory-date is-stage">${escapeHtml(item.stage || '档案')}<span>ARCHIVE</span></div>`;
                return `
                    <article class="memory-card">
                        <div class="memory-meta">
                            ${dateMarkup}
                            <div class="memory-text">
                                ${escapeHtml(item.text)}
                                ${item.subtext ? `<div class="memory-subtext">${escapeHtml(item.subtext)}</div>` : ''}
                            </div>
                        </div>
                        ${item.axis ? `<div class="sg-axis-grid">${[
                            ['When', item.axis.when], ['Feel', item.axis.feel], ['Who', item.axis.who], ['What', item.axis.what], ['Where', item.axis.where]
                        ].filter(pair => pair[1]).map(pair => `<div class="sg-axis-line"><span>${escapeHtml(pair[0])}</span><strong>${escapeHtml(pair[1])}</strong></div>`).join('')}</div>` : ''}
                        <div class="memory-tag-row">
                            <span class="memory-tag">${escapeHtml(item.tag)}</span>
                            <span class="memory-tag">${escapeHtml(item.stamp || '—')}</span>
                            ${(item.chips || []).map(chip => `<span class="memory-tag">${escapeHtml(chip)}</span>`).join('')}
                        </div>
                    </article>
                `;
            }).join('');
        }

        function createRecentMessageDigest(messages, role) {
            const target = messages.filter(message => message.role === role && !message.recalled).slice(-2);
            if (!target.length) return '';
            return target.map(message => createMemorySnippet(message)).join(' / ');
        }

        function buildPlotChapters(contact) {
            const storyBlocks = splitArchiveParagraphs(contact.summaryStory, 4);
            if (storyBlocks.length) {
                return storyBlocks.map((body, index) => ({
                    title: index === 0 ? '剧情整理' : `剧情片段 ${index + 1}`,
                    quote: index === 0 ? (contact.summaryDigest || contact.signature || contact.subtitle) : (contact.signature || contact.subtitle || '拾光剧情'),
                    body,
                    meta: contact.summaryUpdatedAt ? `拾光更新于 ${formatAbsoluteDate(contact.summaryUpdatedAt)}` : '拾光剧情',
                    num: `CHAPTER ${String(index + 1).padStart(2, '0')}`
                }));
            }
            return [];
            const thread = archiveState.threads.get(contact.id) || { messages: [] };
            const messages = thread.messages;
            const firstMessage = messages[0] || null;
            const lastMessage = messages[messages.length - 1] || null;
            const promiseMessages = messages.filter(message => PROMISE_RE.test(message.content || createMemorySnippet(message))).slice(-3);
            const sceneMessages = messages.filter(message => SCENE_RE.test(message.content || createMemorySnippet(message))).slice(-3);
            const chapters = [];

            chapters.push({
                title: '关系底稿',
                quote: contact.relation?.label || contact.subtitle || contact.signature,
                body: [
                    contact.relation?.note,
                    contact.note,
                    contact.signature
                ].filter(Boolean).join(' ').slice(0, 260),
                meta: [
                    contact.accountId ? `账号 ID ${contact.accountId}` : '',
                    contact.dossierRecordId ? `Record ${contact.dossierRecordId}` : ''
                ].filter(Boolean).join(' · ')
            });

            if (firstMessage || lastMessage) {
                chapters.push({
                    title: '互动轨迹',
                    quote: firstMessage ? createMemorySnippet(firstMessage) : createMemorySnippet(lastMessage),
                    body: [
                        firstMessage ? `最早可追溯片段：${createMemorySnippet(firstMessage)}。` : '',
                        lastMessage ? `最近一次更新发生在 ${formatAbsoluteDate(lastMessage.createdAt)}：${createMemorySnippet(lastMessage)}。` : '',
                        createRecentMessageDigest(messages, 'assistant') ? `对方近段时间常说：${createRecentMessageDigest(messages, 'assistant')}。` : '',
                        createRecentMessageDigest(messages, 'user') ? `你留下的最近线索：${createRecentMessageDigest(messages, 'user')}。` : ''
                    ].filter(Boolean).join(' ').slice(0, 360),
                    meta: `${messages.length} 条消息 · ${contact.activeDays || 0} 个活跃日`
                });
            }

            if (promiseMessages.length || contact.lifeStages.length) {
                chapters.push({
                    title: '约定与沉淀',
                    quote: promiseMessages[0] ? createMemorySnippet(promiseMessages[0]) : contact.lifeStages[0]?.experience || contact.signature,
                    body: [
                        promiseMessages.length
                            ? `在现有时间线里，出现了 ${promiseMessages.length} 条带有约定感的片段：${promiseMessages.map(message => createMemorySnippet(message)).join(' / ')}。`
                            : '当前还没有明确的约定台词，但成长片段已经形成了可回收的长期记忆。'
                        ,
                        contact.lifeStages.length
                            ? `角色资料还提供了 ${contact.lifeStages.length} 个成长阶段，可作为更长期的记忆锚点。`
                            : ''
                    ].filter(Boolean).join(' ').slice(0, 360),
                    meta: 'Promise Awareness'
                });
            }

            if (sceneMessages.length || contact.ipCity || contact.homeAddress) {
                const sceneText = sceneMessages.map(message => createMemorySnippet(message)).join(' / ');
                chapters.push({
                    title: '场景余温',
                    quote: sceneText || contact.ipCity || contact.homeAddress || contact.nationality,
                    body: [
                        sceneText ? `聊天里已经出现能形成场景记忆的线索：${sceneText}。` : '',
                        contact.ipCity ? `IP 城市指向 ${contact.ipCity}。` : '',
                        contact.homeAddress ? `档案里还记下了居住落点：${contact.homeAddress}。` : '',
                        contact.nationality ? `国籍/地域信息：${contact.nationality}。` : ''
                    ].filter(Boolean).join(' ').slice(0, 320),
                    meta: 'Scene Index'
                });
            }

            return chapters
                .filter(chapter => chapter.quote || chapter.body)
                .slice(0, 4)
                .map((chapter, index) => ({ ...chapter, num: `CHAPTER ${String(index + 1).padStart(2, '0')}` }));
        }

        function renderPlot(contact) {
            const chapters = buildPlotChapters(contact);
            if (!chapters.length) {
                elements.plotTimeline.innerHTML = createEmptyStateMarkup('暂无剧情', '还没有为这个联系人生成拾光剧情。');
                return;
            }
            if (!chapters.length) {
                elements.plotTimeline.innerHTML = createEmptyStateMarkup('暂无剧情线', '当前联系人还没有足够的互动片段可整理成剧情线。');
                return;
            }
            elements.plotTimeline.innerHTML = chapters.map(chapter => `
                <article class="plot-chapter">
                    <span class="chapter-num">${escapeHtml(chapter.num)}</span>
                    <h3 class="chapter-title">${escapeHtml(chapter.title)}</h3>
                    <div class="chapter-quote">“${escapeHtml(chapter.quote || '待补全')}”</div>
                    <p class="chapter-body">${escapeHtml(chapter.body || '当前还没有更多可复盘的剧情片段。')}</p>
                    ${chapter.meta ? `<div class="plot-meta">${escapeHtml(chapter.meta)}</div>` : ''}
                </article>
            `).join('');
        }

        function clampPercent(value, fallback = 0) {
            const number = Number(value);
            if (!Number.isFinite(number)) return fallback;
            return Math.max(0, Math.min(100, Math.round(number)));
        }

        function getSummaryProfileSource(contact) {
            return [
                archiveState.scope?.bio || '',
                contact.relation?.label || '',
                contact.relation?.note || '',
                contact.record?.relation || '',
                contact.record?.setting || '',
                contact.record?.monologue || '',
                contact.note || '',
                contact.signature || '',
                ...(Array.isArray(contact.record?.tags) ? contact.record.tags : []),
                ...(Array.isArray(contact.tags) ? contact.tags : [])
            ]
                .map(value => String(value || '').trim())
                .filter(Boolean)
                .join(' ');
        }

        function countPatternHits(text, pattern) {
            const matches = String(text || '').match(pattern);
            return Array.isArray(matches) ? matches.length : 0;
        }

        function buildSummaryNarrative(contact) {
            const narrativeSource =
                contact.relation?.note
                || contact.record?.setting
                || contact.record?.monologue
                || contact.note
                || contact.signature
                || contact.summaryDigest
                || '';
            const parts = splitArchiveParagraphs(narrativeSource, 2);
            const summary = normalizeText(parts.join(' '), 132);
            return summary || '当前主要依据双方设定与关系网描述整理这份关系摘要。';
        }

        function computeIntimacy(contact) {
            const source = getSummaryProfileSource(contact);
            const relationLabel = `${contact.relation?.label || ''} ${contact.record?.relation || ''}`;
            const romanceHits = countPatternHits(source, /(恋人|情侣|爱人|伴侣|暧昧|喜欢|心动|心上人|偏爱)/gi);
            const bondHits = countPatternHits(source, /(默契|熟悉|信任|依赖|陪伴|长期|稳定|沉淀|习惯|靠近|同频)/gi);
            const exclusivityHits = countPatternHits(source, /(唯一|例外|特例|专属|独占|占有|只对|只准|不许)/gi);
            const guardedHits = countPatternHits(source, /(克制|防备|试探|拉扯|后退|慢热|隐忍|压抑)/gi);
            const softenedHits = countPatternHits(source, /(温柔|细腻|包容|体贴|安抚|照顾|守护|保护)/gi);
            let score = 18 + (romanceHits * 10) + (bondHits * 8) + (exclusivityHits * 9) + (softenedHits * 7) + (guardedHits * 4);
            if (/(恋人|情侣|爱人|伴侣)/i.test(relationLabel)) score += 24;
            else if (/(暧昧|喜欢|crush|心上人)/i.test(relationLabel)) score += 18;
            else if (/(同盟|搭档|挚友|并肩|伙伴)/i.test(relationLabel)) score += 12;
            if (!source) score = 26;
            score = clampPercent(score, 26);
            if (score >= 82) return { label: '熟络 / 默契累积中', note: buildSummaryNarrative(contact), score };
            if (score >= 60) return { label: '升温 / 关系推进中', note: buildSummaryNarrative(contact), score };
            if (score >= 42) return { label: '试探 / 边界靠近中', note: buildSummaryNarrative(contact), score };
            return { label: '初识 / 设定铺陈中', note: buildSummaryNarrative(contact), score };
        }

        function getSummaryTraitFallbacks(contact) {
            const relationLabel = `${contact.relation?.label || ''} ${contact.record?.relation || ''}`;
            if (/(同盟|搭档|挚友|并肩|伙伴)/i.test(relationLabel)) {
                return [
                    { label: '默契', value: 78 },
                    { label: '克制', value: 64 },
                    { label: '保护欲', value: 58 }
                ];
            }
            if (/(恋人|情侣|爱人|伴侣|暧昧|喜欢)/i.test(relationLabel)) {
                return [
                    { label: '温柔', value: 76 },
                    { label: '占有欲', value: 72 },
                    { label: '慢热', value: 54 }
                ];
            }
            return [
                { label: '克制', value: 62 },
                { label: '温柔', value: 56 },
                { label: '慢热', value: 48 }
            ];
        }

        function buildSummaryTraitBars(contact) {
            const source = getSummaryProfileSource(contact);
            const relationLabel = `${contact.relation?.label || ''} ${contact.record?.relation || ''}`;
            const romantic = /(恋人|情侣|爱人|伴侣|暧昧|喜欢|心上人)/i.test(relationLabel);
            const allied = /(同盟|搭档|挚友|并肩|伙伴)/i.test(relationLabel);
            const presets = [
                { label: '克制', pattern: /(克制|隐忍|收着|压抑|沉默|后退|防备|疏离)/gi, base: allied ? 30 : 24 },
                { label: '温柔', pattern: /(温柔|细腻|体贴|照顾|包容|安抚|柔和|宠|守护)/gi, base: romantic ? 32 : 24 },
                { label: '占有欲', pattern: /(占有欲|独占|独占欲|偏爱|唯一|例外|专属|掌控|不许|只准)/gi, base: romantic ? 28 : 18 },
                { label: '慢热', pattern: /(慢热|试探|谨慎|观望|后退|拉扯|防备)/gi, base: 20 },
                { label: '保护欲', pattern: /(保护|守护|护着|照顾|撑腰|不放心|安稳)/gi, base: romantic ? 24 : 20 },
                { label: '直球', pattern: /(直球|主动|热烈|坦率|明说|直接|追着)/gi, base: 18 },
                { label: '默契', pattern: /(默契|同频|并肩|同盟|契合|熟悉|信任)/gi, base: allied ? 30 : 20 },
                { label: '依赖感', pattern: /(依赖|离不开|需要|习惯|黏|陪伴)/gi, base: romantic ? 22 : 16 },
                { label: '掌控感', pattern: /(掌控|支配|主导|强势|命令|压制)/gi, base: 18 }
            ];
            const scored = presets
                .map(preset => {
                    const hits = countPatternHits(source, preset.pattern);
                    const relationBoost =
                        preset.label === '占有欲' && romantic ? 10
                        : preset.label === '温柔' && romantic ? 8
                        : preset.label === '默契' && allied ? 12
                        : preset.label === '克制' && allied ? 8
                        : 0;
                    return {
                        label: preset.label,
                        value: clampPercent((source ? 12 : 0) + preset.base + relationBoost + (hits * 16), 42),
                        hits
                    };
                })
                .sort((left, right) => {
                    if (right.hits !== left.hits) return right.hits - left.hits;
                    return right.value - left.value;
                });
            const picked = scored.filter(item => item.hits > 0).slice(0, 3).map(item => ({ label: item.label, value: item.value }));
            const merged = [...picked];
            getSummaryTraitFallbacks(contact).forEach(item => {
                if (merged.length >= 3) return;
                if (merged.some(existing => existing.label === item.label)) return;
                merged.push(item);
            });
            scored.forEach(item => {
                if (merged.length >= 3) return;
                if (merged.some(existing => existing.label === item.label)) return;
                merged.push({ label: item.label, value: Math.max(48, item.value) });
            });
            return merged.slice(0, 3);
        }

        function sanitizeSummaryTag(value) {
            const text = normalizeText(value, 10);
            if (!text) return '';
            if (/^\d+$/.test(text)) return '';
            if (/^[A-Za-z\s]+$/.test(text)) return '';
            if (/^(中国|美国|英国|法国|日本|韩国|china|japan|korea)$/i.test(text)) return '';
            if (text.length > 8) return '';
            return text;
        }

        function buildSummaryKeyTags(contact, traits) {
            const source = getSummaryProfileSource(contact);
            const tags = [];
            const relationLabel = sanitizeSummaryTag(contact.relation?.label || contact.record?.relation || '');
            if (relationLabel && relationLabel !== '关系待补全') tags.push(relationLabel);
            [
                ['唯一特例', /(唯一|例外|特例|专属|只对|偏爱)/i],
                ['慢热', /(慢热|试探|谨慎|观望|后退)/i],
                ['隐忍', /(隐忍|克制|压抑|不表露|沉默)/i],
                ['温柔', /(温柔|细腻|体贴|安抚|包容)/i],
                ['保护欲', /(保护|守护|护着|照顾|撑腰)/i],
                ['直球', /(直球|主动|坦率|直接|明说)/i],
                ['独占欲', /(占有欲|独占|不许|只准|掌控)/i],
                ['同盟', /(同盟|并肩|搭档|伙伴|站在同一边)/i],
                ['默契', /(默契|同频|熟悉|信任)/i],
                ['黏着', /(黏|依赖|离不开|陪伴)/i],
                ['边界感', /(边界|克己|收着|分寸)/i]
            ].forEach(([label, pattern]) => {
                if (pattern.test(source)) tags.push(label);
            });
            (Array.isArray(traits) ? traits : []).forEach(item => tags.push(item.label));
            [
                ...(Array.isArray(contact.record?.tags) ? contact.record.tags : []),
                ...(Array.isArray(contact.tags) ? contact.tags : [])
            ]
                .map(sanitizeSummaryTag)
                .filter(Boolean)
                .forEach(tag => tags.push(tag));
            return [...new Set(tags)].filter(tag => tag && tag !== '关系待补全').slice(0, 4);
        }

        function createCoreMemoryText(contact) {
            const parts = [];
            if (contact.firstMessage) parts.push(`起点：${createMemorySnippet(contact.firstMessage)}`);
            if (contact.lastMessage && contact.lastMessage !== contact.firstMessage) parts.push(`最近：${createMemorySnippet(contact.lastMessage)}`);
            if (contact.relation?.note) parts.push(`关系备注：${contact.relation.note}`);
            if (!parts.length) parts.push(contact.note || '这份档案还没有形成可归档的核心记忆。');
            return parts.join(' ');
        }

        function createSummaryBoxes(contact) {
            const intimacy = computeIntimacy(contact);
            const traits = buildSummaryTraitBars(contact);
            const keyTags = buildSummaryKeyTags(contact, traits);
            return [
                `
                    <section class="summary-box full">
                        <span class="box-label">Current Intimacy</span>
                        <div class="box-value summary-intimacy-value">${escapeHtml(intimacy.label)}</div>
                        <p class="summary-note">${escapeHtml(intimacy.note)}</p>
                    </section>
                `,
                `
                    <section class="summary-box full">
                        <span class="box-label">Traits & Tendency</span>
                        ${traits.map(axis => `
                            <div class="stat-row">
                                <span class="stat-name">${escapeHtml(axis.label)}</span>
                                <div class="stat-bar-bg" aria-hidden="true"><div class="stat-bar-fill" style="width:${axis.value}%;"></div></div>
                            </div>
                        `).join('')}
                    </section>
                `,
                `
                    <section class="summary-box full">
                        <span class="box-label">Key Tags</span>
                        <div class="relation-tags">
                            ${keyTags.map((tag, index) => `
                                <span class="relation-tag${index === 0 || index === keyTags.length - 1 ? ' solid' : ''}">${escapeHtml(tag)}</span>
                            `).join('') || `<span class="relation-tag solid">${escapeHtml(contact.signature || '待补全')}</span>`}
                        </div>
                    </section>
                `
            ];
        }

        function renderSummary(contact) {
            const boxes = createSummaryBoxes(contact);
            if (!boxes.length) {
                elements.summaryGrid.innerHTML = createEmptyStateMarkup('暂无总结', '还没有为这个联系人生成拾光总结。');
                return;
            }
            elements.summaryAvatar.dataset.avatarSeed = getAvatarSeedValue(contact);
            setAvatarSurface(elements.summaryAvatar, contact.avatar, getContactInitial(contact));
            elements.summaryName.textContent = getHomeListName(contact);
            elements.summaryId.textContent = getDisplayArchiveId(contact);
            elements.summaryGrid.innerHTML = boxes.join('');
        }


        function renderDaily(contact) {
            const memory = getContactLongMemory(contact);
            const daily = memory.dailySummaries;
            if (!daily.length) {
                elements.dailyList.innerHTML = createEmptyStateMarkup('暂无今日线上摘要', '可以回到管理页选择该角色并点击“生成今日线上摘要”。');
                return;
            }
            elements.dailyList.innerHTML = daily.slice(0, 20).map(item => `
                <article class="memory-card">
                    <div class="memory-meta">
                        <div class="memory-date is-stage">${escapeHtml(item.date)}<span>DAILY</span></div>
                        <div class="memory-text">
                            ${escapeHtml(item.summary || '未写摘要正文')}
                            ${item.keyPoints?.length ? `<div class="memory-subtext">关键点：${escapeHtml(item.keyPoints.join('、'))}</div>` : ''}
                            ${item.unresolved?.length ? `<div class="memory-subtext">待续：${escapeHtml(item.unresolved.join('、'))}</div>` : ''}
                        </div>
                    </div>
                    <div class="memory-tag-row">
                        <span class="memory-tag">${escapeHtml(item.mood || '线上摘要')}</span>
                        <span class="memory-tag">${escapeHtml(`${item.messageCount || 0} 条消息`)}</span>
                        ${item.promises?.length ? `<span class="memory-tag">${escapeHtml(`约定 ${item.promises.length}`)}</span>` : ''}
                    </div>
                </article>
            `).join('');
        }

        function renderDetailPromises(contact) {
            const memory = getContactLongMemory(contact);
            elements.detailPromiseList.innerHTML = memory.promises.length
                ? memory.promises.map(item => createSystemCardMarkup({ ...item, contact }, {
                    kicker: 'Agreement',
                    title: item.status,
                    text: item.text,
                    chips: [item.dueText ? { text: `到期 ${item.dueText}`, solid: true } : { text: '无明确期限', solid: true }, { text: `重要度 ${item.importance}` }, { text: item.source || 'summary' }]
                })).join('')
                : createEmptyStateMarkup('暂无约定', '这个角色还没有被总结出明确约定。');
        }

        function renderDetailCore(contact) {
            const memory = getContactLongMemory(contact);
            elements.detailCoreList.innerHTML = memory.coreMemories.length
                ? memory.coreMemories.map(item => createSystemCardMarkup({ ...item, contact }, {
                    kicker: 'Core Change',
                    title: `${item.type} / ${item.change}`,
                    text: item.text,
                    chips: [{ text: `强度 ${item.intensity}`, solid: true }, { text: formatTimeAgo(item.updatedAt || item.createdAt) }]
                })).join('')
                : createEmptyStateMarkup('暂无核心记忆变化', '关系里程碑、重大事件、冲突修复等会进入这里。');
        }

        function renderDetailRecall(contact) {
            const memory = getContactLongMemory(contact);
            const items = memory.entries
                .map(item => ({ ...item, recallScore: Math.max(Number(item.recallScore) || 0, scoreRecallPreview(item, contact)) }))
                .sort((a, b) => (b.recallScore || 0) - (a.recallScore || 0))
                .slice(0, 30);
            elements.detailRecallList.innerHTML = items.length
                ? items.map(item => createSystemCardMarkup({ ...item, contact }, {
                    kicker: 'Algorithmic Recall',
                    title: `score ${item.recallScore || 0}`,
                    text: item.text,
                    chips: [{ text: `召回 ${item.recallCount || 0} 次`, solid: true }, { text: `情感 ${item.emotionalWeight}` }, { text: `关系 ${item.relationWeight}` }],
                    reason: createRecallReason(item, contact)
                })).join('')
                : createEmptyStateMarkup('暂无召回命中', '该角色还没有可用于回复前召回的结构化长期记忆。');
        }

        function renderDetailLegacy(contact, options = {}) {
            elements.detailHeroAvatar.dataset.avatarSeed = getAvatarSeedValue(contact);
            setAvatarSurface(elements.detailHeroAvatar, contact.avatar, getContactInitial(contact));
            elements.detailTitle.textContent = '拾光档案';
            if (elements.detailName) elements.detailName.textContent = getHomeListName(contact);
            const relationLabel = contact.relation?.label || contact.record?.relation || '关系待补全';
            const nationalityLabel = contact.nationality || '国籍未设定';
            elements.detailHeroTags.innerHTML = [
                `<div class="detail-meta-line"><span>关系</span><strong>${escapeHtml(relationLabel)}</strong></div>`,
                `<div class="detail-meta-line"><span>国籍</span><strong>${escapeHtml(nationalityLabel)}</strong></div>`
            ].join('');
            if (elements.detailHeroId) elements.detailHeroId.textContent = `ID ${getDisplayArchiveId(contact)}`;
            renderMemory(contact);
            renderDaily(contact);
            renderDetailPromises(contact);
            renderDetailCore(contact);
            renderDetailRecall(contact);
            renderSummary(contact);
            switchDetailView(options.activeView || currentDetailView || 'view-memory');
        }

        function renderDetail(contact, options = {}) {
            elements.detailHeroAvatar.dataset.avatarSeed = getAvatarSeedValue(contact);
            setAvatarSurface(elements.detailHeroAvatar, contact.avatar, getContactInitial(contact));
            elements.detailTitle.textContent = '拾光档案';
            if (elements.detailName) elements.detailName.textContent = getHomeListName(contact);
            const relationLabel = contact.relation?.label || contact.record?.relation || '关系待补全';
            const nationalityLabel = contact.nationality || '国籍未设定';
            elements.detailHeroTags.innerHTML = [
                `<div class="detail-meta-line"><span>关系</span><strong>${escapeHtml(relationLabel)}</strong></div>`,
                `<div class="detail-meta-line"><span>国籍</span><strong>${escapeHtml(nationalityLabel)}</strong></div>`,
            ].join('');
            if (elements.detailHeroId) elements.detailHeroId.textContent = `ID ${getDisplayArchiveId(contact)}`;
            renderMemory(contact);
            renderDaily(contact);
            renderDetailPromises(contact);
            renderDetailCore(contact);
            renderDetailRecall(contact);
            renderSummary(contact);
            switchDetailView(options.activeView || currentDetailView || 'view-memory');
        }

        async function refreshArchive(options = {}) {
            try {
                archiveState = {
                    ...archiveState,
                    ...(await readArchiveRecords())
                };
                renderHome();
                if (currentDetailId) {
                    const contact = getScopedContact(currentDetailId);
                    if (contact) renderDetail(contact, { activeView: currentDetailView });
                    else backToHome();
                }
                if (!options.silent) showToast('拾光档案已刷新。');
            } catch (error) {
                console.warn('Shiguang archive hydrate failed:', error);
                archiveState = {
                    ...archiveState,
                    scope: null,
                    scopeOptions: [],
                    contacts: [],
                    allowedIds: new Set(),
                    threads: new Map(),
                    userMoments: [],
                    audit: createArchiveAudit()
                };
                renderHome();
                showToast(error?.message || '拾光读取失败，请稍后再试。', 2600);
            }
        }


        function getLongMemoryBridge() {
            try {
                const bridge = window.parent && window.parent !== window ? window.parent.PrivateCharacterLongMemoryDB : window.PrivateCharacterLongMemoryDB;
                return bridge && typeof bridge === 'object' ? bridge : null;
            } catch (error) {
                return null;
            }
        }

        function getSelectedManageContactId() {
            return String(elements.manageContactSelect?.value || archiveState.contacts[0]?.id || '').trim();
        }

        async function runManageAction(action) {
            const contactId = getSelectedManageContactId();
            if (!contactId) {
                showToast('请先选择一个联系人。');
                return;
            }
            const bridge = getLongMemoryBridge();
            if (!bridge) {
                showToast('私叙记忆接口尚未就绪，请先打开一次私叙。', 2600);
                return;
            }
            try {
                await action(bridge, contactId);
                await refreshArchive({ silent: true });
            } catch (error) {
                console.warn('Shiguang manage action failed:', error);
                showToast(error?.message || '记忆管理操作失败。', 2800);
            }
        }


        elements.homeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-home-view') || 'home-dashboard';
                if (archiveState.homeView === target) return;
                archiveState.homeView = target;
                renderHomePanels();
            });
        });

        elements.manageImmediateSummary?.addEventListener('click', () => {
            void runManageAction(async (bridge, contactId) => {
                if (typeof bridge.runImmediateSummary !== 'function') throw new Error('当前私叙版本没有暴露立即总结接口。');
                showToast('已请求私叙执行立即总结。');
                await bridge.runImmediateSummary(contactId, { full: true });
            });
        });

        elements.manageDailySummary?.addEventListener('click', () => {
            void runManageAction(async (bridge, contactId) => {
                if (typeof bridge.runDailySummary !== 'function') throw new Error('当前私叙版本没有暴露今日摘要接口。');
                showToast('已请求私叙生成今日线上摘要。');
                await bridge.runDailySummary(contactId);
            });
        });

        elements.manageRebuildIndex?.addEventListener('click', () => {
            void runManageAction(async (bridge, contactId) => {
                if (typeof bridge.rebuildIndex !== 'function') throw new Error('当前私叙版本没有暴露重建索引接口。');
                await bridge.rebuildIndex(contactId);
                showToast('索引已重建。');
            });
        });

        elements.manageCleanMemory?.addEventListener('click', () => {
            void runManageAction(async (bridge, contactId) => {
                const keyword = String(elements.manageCleanKeyword?.value || '').trim();
                if (!keyword) throw new Error('请输入要清理的错误关键词。');
                if (typeof bridge.removeEntriesByKeyword !== 'function') throw new Error('当前私叙版本没有暴露清理接口。');
                const result = await bridge.removeEntriesByKeyword(contactId, keyword);
                showToast(`已清理 ${result?.removed || 0} 条相关记忆。`);
            });
        });

        elements.manageAppendCorrection?.addEventListener('click', () => {
            void runManageAction(async (bridge, contactId) => {
                const text = String(elements.manageCorrectionText?.value || '').trim();
                if (!text) throw new Error('请输入正确记忆或修正说明。');
                if (typeof bridge.appendCorrection !== 'function') throw new Error('当前私叙版本没有暴露修正接口。');
                await bridge.appendCorrection(contactId, text);
                if (elements.manageCorrectionText) elements.manageCorrectionText.value = '';
                showToast('修正记忆已写入核心保护区。');
            });
        });

        elements.manageContactSelect?.addEventListener('change', () => renderManagePanel());

        elements.searchInput.addEventListener('input', event => {
            archiveState.query = String(event.target?.value || '');
            renderHome();
        });

        elements.clearSearch.addEventListener('click', () => {
            archiveState.query = '';
            elements.searchInput.value = '';
            renderHome();
        });

        elements.refreshArchive.addEventListener('click', () => {
            void refreshArchive();
        });

        document.getElementById('home-title')?.addEventListener('click', event => {
            event.preventDefault();
            event.stopPropagation();
            try {
                if (window.parent && window.parent !== window && typeof window.parent.closeShiguangApp === 'function') {
                    window.parent.closeShiguangApp();
                    return;
                }
            } catch (error) {
                console.warn('Home title close fallback failed:', error);
            }
            if (window.history.length > 1) window.history.back();
        });

        elements.detailTitle.addEventListener('click', () => {
            backToHome();
        });

        elements.detailHeroAvatar.addEventListener('click', () => {
            backToHome();
        });

        elements.scopeSwitchTrigger?.addEventListener('click', event => {
            event.stopPropagation();
            scopeSwitchOpen = !scopeSwitchOpen;
            renderScopeSwitchPanel();
        });

        elements.scopeSwitchPanel?.addEventListener('click', event => {
            const option = event.target.closest('[data-scope-option]');
            if (!option) return;
            void switchArchiveScope(option.getAttribute('data-scope-option') || '');
        });

        elements.charList.addEventListener('click', event => {
            const card = event.target.closest('[data-contact-id]');
            if (!card) return;
            openDetail(card.getAttribute('data-contact-id') || '');
        });

        [elements.promiseList, elements.coreList, elements.recallList].forEach(list => {
            list?.addEventListener('click', event => {
                const card = event.target.closest('[data-contact-id]');
                if (!card) return;
                openDetail(card.getAttribute('data-contact-id') || '');
            });
        });

        elements.tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                switchDetailView(tab.getAttribute('data-target') || 'view-memory');
            });
        });

        window.addEventListener('popstate', event => {
            const state = event.state && typeof event.state === 'object' ? event.state : {};
            if (state.__shiguang === 'detail') {
                const contact = getScopedContact(state.contactId || '');
                if (!contact) {
                    backToHome();
                    return;
                }
                currentDetailId = contact.id;
                renderDetail(contact, { activeView: currentDetailView || 'view-memory' });
                elements.homeScreen.classList.remove('active');
                elements.detailScreen.classList.add('active');
                window.scrollTo({ top: 0, behavior: 'auto' });
                return;
            }
            if (elements.detailScreen.classList.contains('active')) backToHome();
        });

        window.addEventListener('pageshow', () => {
            void refreshArchive({ silent: true });
        });

        window.addEventListener('message', event => {
            const data = event.data;
            if (!data || typeof data !== 'object') return;
            if (data.source !== 'rinno-host' || data.frameApp !== 'shiguang' || data.type !== 'reset-view') return;
            if (elements.detailScreen.classList.contains('active')) backToHome();
            currentDetailView = 'view-memory';
            archiveState.homeView = 'home-dashboard';
            renderHomePanels();
            switchDetailView('view-memory');
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) void refreshArchive({ silent: true });
        });

        document.addEventListener('click', event => {
            if (!scopeSwitchOpen) return;
            const target = event.target;
            if (elements.scopeSwitchPanel?.contains(target) || elements.scopeSwitchTrigger?.contains(target)) return;
            closeScopeSwitchPanel();
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape' && scopeSwitchOpen) closeScopeSwitchPanel();
        });

        if (window.history && typeof window.history.replaceState === 'function') {
            window.history.replaceState({ __shiguang: 'home' }, '', window.location.href);
        }

        void refreshArchive({ silent: true });
    </script>
</body>
</html>
