<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>放映</title>
<style>
:root {
    --dy-bg: #050506;
    --dy-page: #0b0b0d;
    --dy-ink: #ffffff;
    --dy-sub: rgba(255, 255, 255, 0.68);
    --dy-faint: rgba(255, 255, 255, 0.42);
    --dy-line: rgba(255, 255, 255, 0.10);
    --dy-panel: rgba(18, 18, 20, 0.78);
    --dy-panel-soft: rgba(255, 255, 255, 0.12);
    --dy-panel-strong: rgba(0, 0, 0, 0.58);
    --dy-red: #fe2c55;
    --dy-cyan: #25f4ee;
    --dy-gold: #ffd36a;
    --dy-blur: blur(18px) saturate(130%);
    --dy-font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
}
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
html,
body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--dy-bg);
    color: var(--dy-ink);
    font-family: var(--dy-font);
    overscroll-behavior: none;
    touch-action: manipulation;
}
button,
input {
    font: inherit;
}
button {
    border: 0;
    background: none;
    color: inherit;
    padding: 0;
    cursor: pointer;
}
.cinema-app {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    min-height: 100svh;
    overflow: hidden;
    background: var(--dy-bg);
    isolation: isolate;
}
.cinema-app svg {
    width: 1em;
    height: 1em;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
}
.cinema-page {
    position: absolute;
    inset: 0;
    display: none;
    overflow: hidden;
    background: var(--dy-bg);
}
.cinema-page.active {
    display: block;
}
.cinema-scroll-page {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(82px + env(safe-area-inset-bottom, 0px));
    scrollbar-width: none;
}
.cinema-scroll-page::-webkit-scrollbar {
    display: none;
}
.cinema-topbar {
    position: absolute;
    top: max(10px, env(safe-area-inset-top, 0px));
    left: 0;
    right: 0;
    z-index: 20;
    height: 58px;
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    align-items: center;
    padding: 0 10px;
    pointer-events: none;
}
.cinema-icon-button,
.cinema-round-icon {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: rgba(0, 0, 0, 0.22);
    color: #fff;
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    pointer-events: auto;
}
.cinema-icon-button svg,
.cinema-round-icon svg {
    width: 23px;
    height: 23px;
}
.cinema-top-tabs {
    justify-self: center;
    display: flex;
    align-items: center;
    gap: 20px;
    color: rgba(255, 255, 255, 0.70);
    font-size: 16px;
    font-weight: 640;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.46);
    pointer-events: auto;
}
.cinema-top-tabs button {
    position: relative;
    color: inherit;
    line-height: 1;
}
.cinema-top-tabs button.active {
    color: #fff;
    font-size: 18px;
    font-weight: 780;
}
.cinema-top-tabs button.active::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -10px;
    width: 24px;
    height: 3px;
    border-radius: 999px;
    transform: translateX(-50%);
    background: #fff;
}
.cinema-home-layer {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.40) 0%, transparent 19%, transparent 56%, rgba(0, 0, 0, 0.92) 100%),
        radial-gradient(circle at 18% 11%, rgba(254, 44, 85, 0.24), transparent 32%),
        radial-gradient(circle at 78% 7%, rgba(37, 244, 238, 0.18), transparent 30%),
        linear-gradient(135deg, #12131a 0%, #050506 46%, #211119 100%);
    overflow: hidden;
}
.cinema-home-layer::before {
    content: "";
    position: absolute;
    inset: -8%;
    background:
        radial-gradient(circle at 36% 25%, rgba(255, 255, 255, 0.14), transparent 14%),
        linear-gradient(100deg, transparent 0 31%, rgba(255, 255, 255, 0.08) 32% 34%, transparent 35% 100%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.028) 0 1px, transparent 1px 42px);
    opacity: 0.92;
}
.cinema-video-card {
    position: absolute;
    left: 50%;
    top: 21%;
    transform: translateX(-50%);
    width: min(67vw, 330px);
    aspect-ratio: 9 / 14;
    border-radius: 34px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), transparent 28%),
        linear-gradient(135deg, rgba(254, 44, 85, 0.24), rgba(37, 244, 238, 0.08) 42%, rgba(255, 255, 255, 0.04));
    box-shadow:
        0 28px 88px rgba(0, 0, 0, 0.56),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    overflow: hidden;
}
.cinema-video-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 58% 22%, rgba(255, 255, 255, 0.18), transparent 18%),
        linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.68));
}
.cinema-video-card::after {
    content: "LIVE";
    position: absolute;
    left: 18px;
    top: 18px;
    height: 25px;
    padding: 0 10px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--dy-red), #ff6b83);
    display: flex;
    align-items: center;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
}
.cinema-live-pills {
    position: absolute;
    top: calc(max(10px, env(safe-area-inset-top, 0px)) + 64px);
    left: 12px;
    right: 56px;
    z-index: 8;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
}
.cinema-live-pills::-webkit-scrollbar {
    display: none;
}
.cinema-live-pill {
    flex: 0 0 auto;
    height: 32px;
    padding: 0 13px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 0, 0, 0.32);
    color: rgba(255, 255, 255, 0.88);
    font-size: 12px;
    font-weight: 650;
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    white-space: nowrap;
}
.cinema-live-pill.active {
    background: rgba(255, 255, 255, 0.92);
    color: #111;
}
.cinema-live-pill-dot {
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: var(--dy-red);
    box-shadow: 0 0 0 3px rgba(254, 44, 85, 0.16);
}
.cinema-floating-search {
    position: absolute;
    right: 11px;
    top: calc(max(10px, env(safe-area-inset-top, 0px)) + 64px);
    z-index: 9;
    width: 42px;
    height: 42px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: rgba(0, 0, 0, 0.28);
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
}
.cinema-floating-search svg {
    width: 22px;
    height: 22px;
}
.cinema-host-card {
    position: absolute;
    left: 12px;
    top: calc(max(10px, env(safe-area-inset-top, 0px)) + 108px);
    z-index: 8;
    max-width: calc(100% - 96px);
    min-width: 206px;
    height: 48px;
    border-radius: 999px;
    padding: 5px 7px 5px 5px;
    background: rgba(0, 0, 0, 0.42);
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    display: flex;
    align-items: center;
    gap: 8px;
}
.cinema-avatar,
.cinema-mini-avatar {
    position: relative;
    flex: 0 0 auto;
    border-radius: 999px;
    background:
        radial-gradient(circle at 36% 30%, rgba(255, 255, 255, 0.88), transparent 0 14%, rgba(255, 255, 255, 0.16) 15% 23%, transparent 24%),
        linear-gradient(135deg, #ff8aa3, #9c6bff 48%, #25f4ee);
    box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 0.56);
}
.cinema-avatar {
    width: 38px;
    height: 38px;
}
.cinema-mini-avatar {
    width: 36px;
    height: 36px;
}
.cinema-host-copy {
    min-width: 0;
    flex: 1;
}
.cinema-host-name {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    font-size: 13px;
    font-weight: 760;
    line-height: 1.15;
}
.cinema-host-name span:first-child {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.cinema-host-verified {
    width: 13px;
    height: 13px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: #fff;
    color: #161616;
}
.cinema-host-verified svg {
    width: 10px;
    height: 10px;
    stroke-width: 3;
}
.cinema-host-meta {
    margin-top: 2px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.64);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.cinema-follow {
    flex: 0 0 auto;
    height: 31px;
    min-width: 58px;
    padding: 0 13px;
    border-radius: 999px;
    background: #fff;
    color: #111;
    font-size: 12px;
    font-weight: 760;
}
.cinema-viewers {
    position: absolute;
    top: calc(max(10px, env(safe-area-inset-top, 0px)) + 110px);
    right: 11px;
    z-index: 8;
    display: flex;
    align-items: center;
    gap: 5px;
    height: 44px;
    padding: 0 9px 0 4px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.34);
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
}
.cinema-viewer-stack {
    display: flex;
    align-items: center;
}
.cinema-viewer {
    width: 26px;
    height: 26px;
    margin-left: -7px;
    border: 1.5px solid rgba(255, 255, 255, 0.75);
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(254, 44, 85, 0.76));
}
.cinema-viewer:first-child {
    margin-left: 0;
}
.cinema-viewers strong {
    font-size: 11px;
    font-weight: 760;
}
.cinema-rank-card {
    position: absolute;
    top: calc(max(10px, env(safe-area-inset-top, 0px)) + 164px);
    left: 12px;
    right: 74px;
    z-index: 8;
    height: 36px;
    border-radius: 13px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: linear-gradient(90deg, rgba(254, 44, 85, 0.56), rgba(0, 0, 0, 0.18));
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    color: rgba(255, 255, 255, 0.92);
    font-size: 12px;
}
.cinema-rank-card b {
    font-size: 13px;
}
.cinema-side-actions {
    position: absolute;
    right: 9px;
    bottom: calc(120px + env(safe-area-inset-bottom, 0px));
    z-index: 9;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
}
.cinema-action {
    width: 52px;
    min-height: 54px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.58);
}
.cinema-action span {
    width: 45px;
    height: 45px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: rgba(0, 0, 0, 0.26);
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.11);
}
.cinema-action svg {
    width: 25px;
    height: 25px;
}
.cinema-action small {
    font-size: 10px;
    line-height: 1;
    font-weight: 650;
}
.cinema-room-title {
    position: absolute;
    left: 14px;
    right: 82px;
    bottom: calc(248px + env(safe-area-inset-bottom, 0px));
    z-index: 8;
    display: grid;
    gap: 6px;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.54);
}
.cinema-room-title h1 {
    margin: 0;
    font-size: 18px;
    line-height: 1.18;
    font-weight: 780;
    letter-spacing: -0.02em;
}
.cinema-room-title p {
    margin: 0;
    color: rgba(255, 255, 255, 0.78);
    font-size: 12px;
    line-height: 1.38;
}
.cinema-gift-strip {
    position: absolute;
    left: 12px;
    right: 72px;
    bottom: calc(202px + env(safe-area-inset-bottom, 0px));
    z-index: 8;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
}
.cinema-gift-strip::-webkit-scrollbar {
    display: none;
}
.cinema-gift-card {
    flex: 0 0 auto;
    height: 30px;
    border-radius: 999px;
    padding: 0 11px;
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(0, 0, 0, 0.36);
    color: rgba(255, 255, 255, 0.86);
    font-size: 11px;
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
}
.cinema-gift-mark {
    width: 17px;
    height: 17px;
    border-radius: 6px;
    background: linear-gradient(135deg, #fff, var(--dy-red));
}
.cinema-comments {
    position: absolute;
    left: 12px;
    right: 76px;
    bottom: calc(128px + env(safe-area-inset-bottom, 0px));
    z-index: 8;
    display: flex;
    flex-direction: column;
    gap: 7px;
    pointer-events: none;
}
.cinema-comment {
    width: fit-content;
    max-width: 100%;
    border-radius: 13px;
    padding: 7px 10px;
    background: rgba(0, 0, 0, 0.34);
    color: rgba(255, 255, 255, 0.9);
    font-size: 12px;
    line-height: 1.35;
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    animation: cinemaCommentIn 0.28s ease both;
}
.cinema-comment b {
    color: rgba(255, 255, 255, 0.72);
    font-weight: 650;
    margin-right: 6px;
}
@keyframes cinemaCommentIn {
    from { opacity: 0; transform: translate3d(0, 8px, 0); }
    to { opacity: 1; transform: translate3d(0, 0, 0); }
}
.cinema-live-composer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: calc(56px + env(safe-area-inset-bottom, 0px));
    z-index: 11;
    padding: 0 10px 8px;
    background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.68) 36%, rgba(0, 0, 0, 0.92));
}
.cinema-composer-row {
    display: grid;
    grid-template-columns: 1fr 40px 40px 40px;
    gap: 8px;
    align-items: center;
    min-height: 48px;
}
.cinema-composer {
    height: 40px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    padding: 0 13px;
    background: rgba(255, 255, 255, 0.16);
    color: rgba(255, 255, 255, 0.58);
    font-size: 13px;
    font-weight: 520;
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    overflow: hidden;
}
.cinema-composer strong {
    color: #fff;
    font-weight: 700;
    margin-right: 7px;
    white-space: nowrap;
}
.cinema-composer span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.cinema-bottom-action {
    width: 40px;
    height: 40px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.14);
    color: #fff;
    backdrop-filter: var(--dy-blur);
    -webkit-backdrop-filter: var(--dy-blur);
    overflow: visible;
}
.cinema-bottom-action.primary {
    position: relative;
    background: linear-gradient(135deg, #ff2f65 0%, #ff5b87 50%, #ff8a53 100%);
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12) inset, 0 8px 22px rgba(254, 44, 85, 0.26);
}
.cinema-bottom-action svg {
    width: 23px;
    height: 23px;
    overflow: visible;
}
.cinema-bottom-action.primary svg {
    width: 24px;
    height: 24px;
    stroke-width: 2.15;
}
.cinema-bottom-tabs {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 30;
    height: calc(56px + env(safe-area-inset-bottom, 0px));
    padding: 2px 8px env(safe-area-inset-bottom, 0px);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    align-items: center;
    color: rgba(255, 255, 255, 0.58);
    background: rgba(5, 5, 6, 0.78);
    backdrop-filter: blur(22px) saturate(120%);
    -webkit-backdrop-filter: blur(22px) saturate(120%);
    box-shadow: 0 -1px 0 rgba(255, 255, 255, 0.08);
}
.cinema-bottom-tab {
    position: relative;
    display: grid;
    place-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 560;
    min-width: 0;
    height: 50px;
}
.cinema-bottom-tab svg {
    width: 22px;
    height: 22px;
    stroke-width: 2.2;
}
.cinema-bottom-tab.active {
    color: #fff;
    font-weight: 760;
}
.cinema-create {
    width: 42px;
    height: 29px;
    border-radius: 9px;
    background: #fff;
    color: #111;
    display: grid;
    place-items: center;
    box-shadow: -4px 0 0 var(--dy-cyan), 4px 0 0 var(--dy-red);
}
.cinema-create svg {
    width: 17px;
    height: 17px;
    stroke-width: 3;
}
.cinema-page-header {
    position: sticky;
    top: 0;
    z-index: 15;
    min-height: calc(58px + env(safe-area-inset-top, 0px));
    padding: calc(8px + env(safe-area-inset-top, 0px)) 14px 10px;
    display: grid;
    grid-template-columns: 40px 1fr 40px;
    align-items: end;
    background: rgba(10, 10, 12, 0.88);
    backdrop-filter: blur(18px) saturate(120%);
    -webkit-backdrop-filter: blur(18px) saturate(120%);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08);
}
.cinema-page-header h2 {
    margin: 0;
    text-align: center;
    font-size: 18px;
    line-height: 40px;
    font-weight: 760;
    letter-spacing: -0.02em;
}
.cinema-page-header .cinema-icon-button {
    background: transparent;
}
.cinema-block {
    padding: 14px;
}
.cinema-search-bar {
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 0 12px;
    background: rgba(255, 255, 255, 0.10);
    color: var(--dy-faint);
    font-size: 13px;
}
.cinema-search-bar svg {
    width: 18px;
    height: 18px;
}
.cinema-section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 18px 0 10px;
}
.cinema-section-title h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 780;
    letter-spacing: -0.02em;
}
.cinema-section-title button,
.cinema-link-button {
    color: rgba(255, 255, 255, 0.52);
    font-size: 12px;
    font-weight: 620;
}
.cinema-story-row {
    display: flex;
    gap: 13px;
    overflow-x: auto;
    padding: 2px 0 4px;
    scrollbar-width: none;
}
.cinema-story-row::-webkit-scrollbar {
    display: none;
}
.cinema-story {
    width: 64px;
    flex: 0 0 auto;
    display: grid;
    justify-items: center;
    gap: 7px;
    color: rgba(255, 255, 255, 0.72);
    font-size: 11px;
}
.cinema-story-avatar {
    width: 58px;
    height: 58px;
    border-radius: 999px;
    padding: 2px;
    background: conic-gradient(var(--dy-red), var(--dy-gold), var(--dy-cyan), var(--dy-red));
}
.cinema-story-avatar span {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(135deg, #40424c, #171820);
    box-shadow: inset 0 0 0 3px #0b0b0d;
}
.cinema-friend-feed {
    display: grid;
    gap: 13px;
}
.cinema-video-row-card {
    border-radius: 18px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
}
.cinema-video-thumb {
    position: relative;
    height: 168px;
    background:
        radial-gradient(circle at 22% 26%, rgba(254, 44, 85, 0.25), transparent 28%),
        linear-gradient(135deg, #242533, #0d0d12 50%, #32151d);
}
.cinema-video-thumb::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 52px;
    height: 52px;
    transform: translate(-50%, -50%);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.14);

<script>
(() => {
    const app = document.getElementById('cinema-app');
    const pages = Array.from(document.querySelectorAll('[data-cinema-page]'));
    const navButtons = Array.from(document.querySelectorAll('[data-cinema-page-target]'));
    const toast = document.getElementById('cinema-toast');
    let toastTimer = 0;

    function showToast(text) {
        if (!toast || !text) return;
        toast.textContent = text;
        toast.classList.add('show');
        window.clearTimeout(toastTimer);
        toastTimer = window.setTimeout(() => toast.classList.remove('show'), 1100);
    }

    function setPage(name) {
        pages.forEach(page => page.classList.toggle('active', page.getAttribute('data-cinema-page') === name));
        navButtons.forEach(button => {
            const matched = button.getAttribute('data-cinema-page-target') === name;
            if (button.classList.contains('cinema-bottom-tab')) button.classList.toggle('active', matched);
        });
        if (app) app.setAttribute('data-current-page', name);
    }

    navButtons.forEach(button => {
        button.addEventListener('click', () => setPage(button.getAttribute('data-cinema-page-target')));
    });

    document.querySelectorAll('[data-cinema-top-tab]').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('[data-cinema-top-tab]').forEach(item => item.classList.remove('active'));
            button.classList.add('active');
            showToast(button.textContent.trim());
        });
    });

    document.querySelectorAll('.cinema-live-pill').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.cinema-live-pill').forEach(item => item.classList.remove('active'));
            button.classList.add('active');
            showToast(button.textContent.trim());
        });
    });

    document.querySelectorAll('[data-camera-mode]').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('[data-camera-mode]').forEach(item => item.classList.remove('active'));
            button.classList.add('active');
            showToast(button.textContent.trim());
        });
    });

    document.querySelectorAll('[data-profile-tab]').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('[data-profile-tab]').forEach(item => item.classList.remove('active'));
            button.classList.add('active');
            showToast(button.textContent.trim());
        });
    });

    document.querySelectorAll('[data-cinema-toast]').forEach(button => {
        button.addEventListener('click', () => showToast(button.getAttribute('data-cinema-toast')));
    });

    const comments = [
        ['听风的人', '这场放映节奏刚好。'],
        ['南岸', '画面很稳，像真的直播间。'],
        ['迟到五分钟', '底部五个页面都能切了。'],
        ['镜头外', '礼物按钮这次完整了。'],
        ['路过', '关注了，继续放。']
    ];
    const container = document.getElementById('cinema-comments');
    let index = 0;
    function renderComments() {
        if (!container) return;
        const start = Math.max(0, index - 3);
        container.innerHTML = comments.slice(start, index + 1).map(([name, text]) => (
            '<div class="cinema-comment"><b>' + name + '</b>' + text + '</div>'
        )).join('');
        index = (index + 1) % comments.length;
    }
    renderComments();
    window.setInterval(renderComments, 2600);
})();
</script>
